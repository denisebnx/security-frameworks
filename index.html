<script>
/* =====================================================================
   SOUND — synthesized audio cues (Web Audio API, no external files).
   ===================================================================== */
const SOUND = (function(){
  let enabled = true;
  let ctx = null;
  try{ const v=localStorage.getItem('fw_sound'); if(v==='off') enabled=false; }catch(e){}
  function ac(){ if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ ctx=null; } } return ctx; }
  function tone(freq, start, dur, type, gain){
    const a=ac(); if(!a) return;
    const o=a.createOscillator(), g=a.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    o.connect(g); g.connect(a.destination);
    const t=a.currentTime+start;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain||0.12, t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }
  return {
    isOn(){ return enabled; },
    set(on){ enabled=!!on; try{ localStorage.setItem('fw_sound', enabled?'on':'off'); }catch(e){} },
    toggle(){ this.set(!enabled); return enabled; },
    success(){ if(!enabled) return; const a=ac(); if(a&&a.state==='suspended')a.resume(); tone(660,0,0.16,'sine',0.10); tone(990,0.10,0.22,'sine',0.10); },
    error(){ if(!enabled) return; const a=ac(); if(a&&a.state==='suspended')a.resume(); tone(300,0,0.12,'triangle',0.09); tone(240,0.12,0.16,'triangle',0.09); },
    tick(){ if(!enabled) return; const a=ac(); if(a&&a.state==='suspended')a.resume(); tone(880,0,0.07,'sine',0.06); },
    fanfare(){ if(!enabled) return; const a=ac(); if(a&&a.state==='suspended')a.resume(); [523,659,784,1047].forEach((f,i)=>tone(f,i*0.10,0.28,'sine',0.10)); }
  };
})();

/* =====================================================================
   FRAMEWORKS ACADEMY — core runtime
   ===================================================================== */
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>[...r.querySelectorAll(s)];
function el(h){const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const STORE_KEY='frameworks-academy-progress-v1';
const STATE={done:new Set(),xp:0,badges:new Set(),last:null};
let STORAGE_OK=true, STORAGE_CHECKED=false, CURRENT=null;
function storageAvailable(){
  if(STORAGE_CHECKED)return STORAGE_OK;
  STORAGE_CHECKED=true;
  try{const t='__fw_test__';window.localStorage.setItem(t,'1');window.localStorage.removeItem(t);STORAGE_OK=true;}
  catch(e){STORAGE_OK=false;}
  return STORAGE_OK;
}
function saveState(){
  if(!storageAvailable())return;
  try{window.localStorage.setItem(STORE_KEY,JSON.stringify({done:[...STATE.done],xp:STATE.xp,badges:[...STATE.badges],last:STATE.last,ts:Date.now()}));}catch(e){}
}
function loadState(){
  if(!storageAvailable())return false;
  try{
    const raw=window.localStorage.getItem(STORE_KEY);if(!raw)return false;
    const o=JSON.parse(raw);
    STATE.done=new Set(Array.isArray(o.done)?o.done:[]);
    STATE.xp=typeof o.xp==='number'?o.xp:0;
    STATE.badges=new Set(Array.isArray(o.badges)?o.badges:[]);
    STATE.last=o.last||null;
    return STATE.done.size>0||STATE.xp>0;
  }catch(e){return false;}
}
function resetState(){
  STATE.done=new Set();STATE.xp=0;STATE.badges=new Set();STATE.last=null;
  if(storageAvailable()){try{window.localStorage.removeItem(STORE_KEY);}catch(e){}}
}
const XP_PER={concept:10,example:10,lab:40,quiz:25,lesson:15};
function levelFromXp(xp){return Math.floor(xp/250)+1;}
function addXp(n){STATE.xp+=n;const lv=levelFromXp(STATE.xp);$('#xpNum').textContent=STATE.xp;$('#levelNum').textContent=lv;
  const into=STATE.xp%250;$('#xpFill').style.width=(into/250*100)+'%';}
function markDone(key,xp){if(STATE.done.has(key))return false;STATE.done.add(key);if(xp)addXp(xp);refreshProgressUI();saveState();return true;}
function refreshProgressUI(){
  const lessonsDone=new Set();
  STATE.done.forEach(k=>{if(k.startsWith('L:'))lessonsDone.add(k);});
  $('#doneCount').textContent=lessonsDone.size;
  $$('.lesson').forEach(li=>{const id=li.dataset.lesson;li.classList.toggle('done',STATE.done.has('L:'+id));});
  $$('.mod').forEach(m=>{const mid=m.dataset.mod;const lessons=CURRICULUM.find(x=>x.id===mid)?.lessons||[];
    const all=lessons.length&&lessons.every(l=>STATE.done.has('L:'+l.id));m.classList.toggle('done',all);});
}
let TOAST_T;
function toast(icon,title,sub){const t=$('#toast');$('#toastIcon').textContent=icon;$('#toastTitle').textContent=title;$('#toastSub').textContent=sub||'';
  t.classList.add('show');clearTimeout(TOAST_T);TOAST_T=setTimeout(()=>t.classList.remove('show'),3400);}
function earnBadge(id,icon,title,sub){if(STATE.badges.has(id))return;STATE.badges.add(id);saveState();toast(icon,title,sub);
  try{ if(typeof SOUND!=='undefined'){ if(icon==='🏆') SOUND.fanfare(); else SOUND.success(); } }catch(e){}
}
</script>

<script>
/* =====================================================================
   CURRICULUM — Track 1: The 5 Cybersecurity Framework & Standard Groups
   Each lesson: {id,num,title,dek,minutes,concept(html),example(html),lab(obj),quiz[]}
   ===================================================================== */
const CURRICULUM=[

/* ============================ MODULE 01 ============================ */
{ id:'M01', num:'01', title:'Risk Management Frameworks', sub:'6 lessons · the backbone',
  blurb:'The frameworks that tell you how to identify, assess, and treat risk: NIST CSF, the NIST RMF, SP 800-53 and 800-171, the ISO 27000 family, and the FAIR quantitative model.',
  lessons:[

  { id:'01.1', num:'01.1', title:'NIST Cybersecurity Framework (CSF 2.0)', minutes:8,
    dek:'The most widely adopted voluntary framework in the world — a common language for managing cyber risk, organized around a handful of plain-English functions.',
    concept:`<p>The <b>NIST Cybersecurity Framework</b> is a voluntary, risk-based framework first published in 2014 and updated to <b>version 2.0 in 2024</b>. It is deliberately not a checklist of controls — it is a way to <i>organize and communicate</i> cybersecurity outcomes that any organization, in any sector, of any size, can map their existing practices onto.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">NIST CSF 2.0</div>A voluntary framework of cybersecurity outcomes organized into six Functions, used to assess and improve an organization's ability to manage cyber risk and to communicate that posture to stakeholders.</div>
    <h3>The six Functions</h3>
    <p>CSF 2.0 organizes everything under six top-level <b>Functions</b>. Version 1.1 had five; 2.0 added <b>Govern</b> as a new function that wraps around the others.</p>
    <ul>
      <li><b>Govern (GV)</b> — the new sixth function: roles, policy, strategy, oversight, and risk management decisions. It informs all the others.</li>
      <li><b>Identify (ID)</b> — understand assets, data, suppliers, and the risks to them.</li>
      <li><b>Protect (PR)</b> — safeguards: access control, awareness, data security, platform security.</li>
      <li><b>Detect (DE)</b> — find anomalies and incidents quickly.</li>
      <li><b>Respond (RS)</b> — contain, analyze, and act on incidents.</li>
      <li><b>Recover (RC)</b> — restore capabilities and learn from the event.</li>
    </ul>
    <div class="analogy"><div class="al">Think of it like</div>A hospital's emergency readiness. <b>Govern</b> is the hospital board setting policy and budget. <b>Identify</b> is knowing your patients, equipment, and supply chain. <b>Protect</b> is hygiene, locks, and training. <b>Detect</b> is the monitors and alarms. <b>Respond</b> is the crash team. <b>Recover</b> is rehab and the post-incident review. The framework doesn't tell you which brand of monitor to buy — it tells you that you need monitoring at all.</div>
    <h3>Tiers and Profiles</h3>
    <p>Two more pieces make CSF usable. <b>Implementation Tiers</b> (1–4: Partial, Risk Informed, Repeatable, Adaptive) describe how mature and integrated your risk management is. <b>Profiles</b> are a snapshot of which outcomes you've achieved ("Current Profile") versus where you want to be ("Target Profile"); the gap between them is your roadmap.</p>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> CSF is most often used as a <i>common reference</i>. A CISO presents a CSF profile heat-map to the board because "we're Tier 2 on Detect and want to reach Tier 3" communicates far better than a list of 200 technical controls.</div></div>`,
    example:`<p>Here's how a single real activity maps cleanly onto a CSF Function and Category. Read each line as "this outcome belongs to this function."</p>
    <div class="example-wrap"><div class="example-label">Worked example · mapping activities to CSF Functions</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">csf-profile.map</div><div class="chip">CSF 2.0</div></div>
    <div class="console-body"><div class="mono-out">activity                                   function   category
-----------------------------------------------------------------
Board approves a cyber risk appetite       <span style="color:#34d399">GOVERN</span>     GV.RM (Risk Mgmt Strategy)
Maintain an inventory of all servers       <span style="color:#34d399">IDENTIFY</span>   ID.AM (Asset Management)
Enforce MFA on all admin accounts          <span style="color:#34d399">PROTECT</span>    PR.AA (Identity & Access)
SIEM alerts on anomalous logins            <span style="color:#34d399">DETECT</span>     DE.CM (Continuous Monitoring)
Activate the incident response plan        <span style="color:#34d399">RESPOND</span>    RS.MA (Incident Management)
Restore systems from clean backups         <span style="color:#34d399">RECOVER</span>    RC.RP (Incident Recovery)</div></div></div>
    <p>Notice each activity is an <b>outcome</b>, not a product. "Enforce MFA" lives under Protect regardless of whether you use Okta, Duo, or Entra. That product-neutrality is exactly why CSF travels so well across industries.</p></div>`,
    lab:{ kind:'classify', id:'01.1',
      title:'Sort activities into CSF Functions',
      objective:'Assign each security activity to the correct CSF 2.0 <b>Function</b>. This is the core literacy skill for using the framework: hearing an activity and instinctively knowing where it lives.',
      intro:'Six activities. Tag each with its Function. All correct completes the lab.',
      threeway:['Govern','Identify','Protect','Detect','Respond','Recover'],
      items:[
        {t:'Publishing a company-wide cybersecurity policy and assigning a risk owner.',layer:'Govern'},
        {t:'Building and maintaining a complete hardware and software asset inventory.',layer:'Identify'},
        {t:'Encrypting laptops and enforcing least-privilege access.',layer:'Protect'},
        {t:'Deploying endpoint detection that flags unusual process behavior.',layer:'Detect'},
        {t:'Following the runbook to contain a ransomware outbreak.',layer:'Respond'},
        {t:'Restoring operations from backups and running a lessons-learned review.',layer:'Recover'}
      ]},
    quiz:[
      {q:'Which Function is new in CSF 2.0 compared to version 1.1?',
       o:['Detect','Govern','Recover','Identify'],a:1,
       e:'CSF 2.0 added Govern as a sixth function that wraps around and informs the other five, reflecting how central governance is to managing cyber risk.'},
      {q:'What does a CSF "Profile" represent?',
       o:['A certification you pass or fail','A snapshot of current vs. target outcomes, revealing a roadmap','A required list of technical controls','A vendor product comparison'],a:1,
       e:'A Profile aligns the Functions/Categories to your business needs; comparing a Current Profile to a Target Profile produces your improvement roadmap.'},
      {q:'Why is CSF described as product-neutral?',
       o:['It bans commercial tools','It describes outcomes (e.g., "enforce MFA"), not specific products','It only works for government','It is identical to ISO 27001'],a:1,
       e:'CSF specifies the outcome to achieve, leaving the choice of technology to the organization — which is why it maps onto any environment.'}
    ]},

  { id:'01.2', num:'01.2', title:'NIST Risk Management Framework (RMF)', minutes:8,
    dek:'SP 800-37: the seven-step process U.S. federal systems use to authorize a system to operate — and a rigorous model anyone can borrow.',
    concept:`<p>Where CSF is a <i>language</i> for risk, the <b>NIST Risk Management Framework (RMF)</b>, defined in <b>SP 800-37</b>, is a <i>process</i>. It is the disciplined, repeatable lifecycle U.S. federal agencies must follow to manage security and privacy risk and to grant a system an <b>Authorization to Operate (ATO)</b>.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">RMF (SP 800-37)</div>A seven-step lifecycle for managing security and privacy risk to information systems, culminating in a risk-based decision to authorize the system to operate.</div>
    <h3>The seven steps</h3>
    <ol>
      <li><b>Prepare</b> — set context, roles, and risk tolerance (added in RMF rev 2).</li>
      <li><b>Categorize</b> — classify the system by impact (using FIPS 199: low/moderate/high).</li>
      <li><b>Select</b> — choose a baseline of controls from SP 800-53.</li>
      <li><b>Implement</b> — deploy the controls.</li>
      <li><b>Assess</b> — test whether controls are working (often per SP 800-53A).</li>
      <li><b>Authorize</b> — a senior official accepts the residual risk and grants the ATO.</li>
      <li><b>Monitor</b> — continuously track control effectiveness and changes.</li>
    </ol>
    <div class="analogy"><div class="al">Think of it like</div>Getting a building cleared for occupancy. You <b>prepare</b> the project, <b>categorize</b> how critical the building is, <b>select</b> the right codes, <b>build</b> to them, <b>inspect</b>, then an official <b>signs the occupancy permit</b> accepting any remaining issues — and the building stays under ongoing inspection. The ATO is that occupancy permit for a computer system.</div>
    <div class="callout warn"><span class="ic">⚠️</span><div>The <b>Authorize</b> step is a human accepting risk, not a clean bill of health. Systems routinely get an ATO with known, documented weaknesses tracked in a <b>POA&amp;M</b> (Plan of Action and Milestones). "Authorized" means "the risk is understood and accepted," not "perfectly secure."</div></div>`,
    example:`<p>Watch one system move through the front half of the RMF. The Categorize step drives everything downstream.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a payroll system enters the RMF</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">rmf-pipeline.log</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#fbbf24">PREPARE</span>    system owner + AO assigned, risk tolerance = low
<span style="color:#fbbf24">CATEGORIZE</span> contains SSNs & salaries → confidentiality = HIGH
           overall impact (FIPS 199) = <span style="color:#f87171">HIGH</span>
<span style="color:#fbbf24">SELECT</span>     pull the 800-53 HIGH baseline (~370 controls)
           tailor: drop N/A controls, add privacy overlay
<span style="color:#fbbf24">IMPLEMENT</span>  deploy controls, document in the SSP
<span style="color:#fbbf24">ASSESS</span>     assessor tests → 8 findings logged to POA&M
<span style="color:#fbbf24">AUTHORIZE</span>  AO reviews residual risk → grants <span style="color:#34d399">ATO (3 yr)</span>
<span style="color:#fbbf24">MONITOR</span>    continuous monitoring begins</div></div></div>
    <p>The single most consequential choice is <b>Categorize</b>: because payroll data is High-impact, the system inherits the largest control baseline. Miscategorize it as Moderate and you under-protect it; the whole framework hinges on that early judgment.</p></div>`,
    lab:{ kind:'order', id:'01.2',
      title:'Put the RMF steps in order',
      objective:'Arrange the seven RMF steps into the correct sequence. Order matters: you cannot select controls before you have categorized the system, and you cannot authorize before you assess.',
      intro:'The steps below are shuffled. Use the ▲▼ controls to order them, then check.',
      correct:['Prepare','Categorize','Select','Implement','Assess','Authorize','Monitor'],
      scrambled:['Assess','Prepare','Authorize','Select','Monitor','Categorize','Implement']},
    quiz:[
      {q:'What is the deliverable of the Authorize step?',
       o:['A penetration test report','An Authorization to Operate (ATO) — a risk acceptance decision','A control baseline','A FIPS 199 categorization'],a:1,
       e:'A senior official (the Authorizing Official) reviews residual risk and grants the ATO, formally accepting the risk of operating the system.'},
      {q:'Which step determines the size of the control baseline you select?',
       o:['Monitor','Categorize','Implement','Prepare'],a:1,
       e:'Categorize sets the system impact level (low/moderate/high), which drives the SP 800-53 baseline selected in the next step.'},
      {q:'A system receives an ATO but still has open findings. How is that possible?',
       o:['It is not possible — ATO requires zero findings','Known weaknesses are documented in a POA&M and the residual risk is accepted','The findings are deleted','The ATO is automatically revoked'],a:1,
       e:'ATO is a risk-based decision. Documented, tracked weaknesses (in a POA&M) can be accepted by the Authorizing Official.'}
    ]},

  { id:'01.3', num:'01.3', title:'NIST SP 800-53', minutes:7,
    dek:'The exhaustive control catalog behind the RMF — over a thousand controls organized into 20 families, the raw material of federal security.',
    concept:`<p><b>SP 800-53</b> ("Security and Privacy Controls for Information Systems and Organizations") is the giant <b>catalog of controls</b> that the RMF's Select step draws from. If the RMF is the process, 800-53 is the parts bin — currently <b>Revision 5</b>, with over a thousand controls and control enhancements.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">SP 800-53</div>A comprehensive catalog of security and privacy controls, grouped into 20 families (e.g., Access Control, Incident Response), from which organizations select tailored baselines based on system impact.</div>
    <h3>Control families</h3>
    <p>Controls are grouped into <b>20 families</b>, each with a two-letter identifier. A control reads like <code>AC-2</code> (Account Management) inside the <b>AC (Access Control)</b> family. A sample of families:</p>
    <ul>
      <li><b>AC</b> — Access Control</li>
      <li><b>AU</b> — Audit and Accountability</li>
      <li><b>IR</b> — Incident Response</li>
      <li><b>CM</b> — Configuration Management</li>
      <li><b>RA</b> — Risk Assessment</li>
      <li><b>SC</b> — System and Communications Protection</li>
    </ul>
    <h3>Baselines and tailoring</h3>
    <p>You don't implement all 1,000+ controls. Based on the FIPS 199 categorization (low/moderate/high), you start from a <b>baseline</b> and then <b>tailor</b> it — removing controls that don't apply, adding overlays (e.g., privacy, cloud) that do.</p>
    <div class="callout tip"><span class="ic">💡</span><div>The control numbering is a vocabulary worth learning. When an auditor says "your <code>AU-2</code> evidence is thin," they mean your <i>audit logging</i> coverage. Knowing the family codes lets you navigate any federal security conversation.</div></div>`,
    example:`<p>Here is the anatomy of one control as it appears in the catalog, and how it gets tailored for a real system.</p>
    <div class="example-wrap"><div class="example-label">Worked example · reading control AC-2</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">800-53-control.txt</div><div class="chip">REV 5</div></div>
    <div class="console-body"><div class="mono-out">family   : <span style="color:#34d399">AC — Access Control</span>
control  : AC-2  Account Management
baseline : LOW ✓   MODERATE ✓   HIGH ✓
enhancements (added at higher baselines):
  AC-2(1) automated account management   <span style="color:#5c6b80"># MOD+</span>
  AC-2(3) disable inactive accounts       <span style="color:#5c6b80"># MOD+</span>
  AC-2(12) account monitoring for atypical use <span style="color:#5c6b80"># HIGH</span>
tailoring decision:
  system is MODERATE → AC-2 + (1) + (3) apply
  AC-2(12) is HIGH-only → <span style="color:#f87171">excluded</span></div></div></div>
    <p>The base control (<code>AC-2</code>) appears at every level, but its <b>enhancements</b> switch on as impact rises. Tailoring is the engineer's judgment about which of those enhancements your system actually needs.</p></div>`,
    lab:{ kind:'match', id:'01.3',
      title:'Match controls to their families',
      objective:'Match each SP 800-53 control to the correct family. Reading control IDs fluently is the difference between navigating the catalog and drowning in it.',
      intro:'Match each control on the left to its family. All correct completes the lab.',
      pairs:[
        {l:'AC-2 Account Management',r:'Access Control'},
        {l:'IR-4 Incident Handling',r:'Incident Response'},
        {l:'AU-6 Audit Record Review',r:'Audit and Accountability'},
        {l:'RA-5 Vulnerability Scanning',r:'Risk Assessment'}
      ]},
    quiz:[
      {q:'What is the relationship between the RMF and SP 800-53?',
       o:['They are unrelated','SP 800-53 is the control catalog the RMF Select step draws from','SP 800-53 replaced the RMF','The RMF is a subset of SP 800-53'],a:1,
       e:'The RMF is the process; SP 800-53 is the catalog of controls that the Select step pulls a tailored baseline from.'},
      {q:'In the control ID "IR-4", what does "IR" indicate?',
       o:['The impact rating','The Incident Response family','Revision 4','Internal Review'],a:1,
       e:'The two-letter prefix is the control family — IR is Incident Response. The number identifies the specific control within it.'},
      {q:'What does "tailoring" a baseline mean?',
       o:['Writing controls from scratch','Adjusting the starting baseline by removing inapplicable controls and adding overlays','Ignoring the catalog entirely','Lowering the system impact level'],a:1,
       e:'Tailoring adapts the impact-based baseline to the specific system — dropping N/A controls and layering on overlays such as privacy or cloud.'}
    ]},

  { id:'01.4', num:'01.4', title:'NIST SP 800-171 & CUI', minutes:7,
    dek:'How the government protects its sensitive-but-unclassified data once it leaves federal systems and lands on a contractor\'s network.',
    concept:`<p><b>SP 800-171</b> answers a narrower question than 800-53: how do <i>non-federal</i> organizations — defense contractors, universities, suppliers — protect <b>Controlled Unclassified Information (CUI)</b> on their own systems?</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">SP 800-171</div>A set of security requirements for protecting Controlled Unclassified Information (CUI) when it resides on non-federal (e.g., contractor) systems.</div>
    <div class="keyterm"><div class="kt-label">Key term</div><div class="kt-term">CUI</div>Information the government creates or possesses that is sensitive but not classified — and that laws or policies require be safeguarded (e.g., technical drawings, certain research, PII handled for an agency).</div>
    <h3>How it relates to 800-53</h3>
    <p>800-171's requirements are a <b>distilled subset</b> of 800-53, reorganized into requirement families and written for organizations that aren't running a full federal RMF program. It is the backbone of the U.S. defense industrial base's security obligations, and it feeds directly into <b>CMMC</b> (covered later in Governance).</p>
    <div class="analogy"><div class="al">Think of it like</div>A library lending a rare manuscript to a researcher. Inside the library (federal systems), 800-53 governs. The moment the manuscript leaves with the researcher (a contractor), 800-171 is the contract clause that says "here's exactly how you must store, handle, and return it."</div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> If you work for any company that sells to the U.S. Department of Defense, 800-171 compliance is likely written into your contracts via the DFARS clause. Falling short can cost the contract — which is why CMMC assessments now verify it.</div></div>`,
    example:`<p>See how a single 800-53 idea is compressed into an 800-171 requirement a contractor must meet.</p>
    <div class="example-wrap"><div class="example-label">Worked example · 800-53 → 800-171 distillation</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">cui-protection.txt</div></div>
    <div class="console-body"><div class="mono-out">data         : turbine blade CAD files for a DoD contract
classification: <span style="color:#34d399">CUI</span> (not classified, but controlled)
where it lives: contractor's engineering workstations

800-171 requirement family : ACCESS CONTROL (3.1)
  3.1.1 limit access to authorized users        <span style="color:#34d399">✓</span>
  3.1.5 employ least privilege                   <span style="color:#34d399">✓</span>
  3.1.20 control connections to external systems <span style="color:#f87171">gap</span>

result: gap logged → remediation plan required
        (assessed under CMMC for DoD work)</div></div></div>
    <p>The contractor doesn't run the full RMF; they meet the focused 800-171 requirement set. Each unmet requirement is a gap that must be planned and closed before it threatens the contract.</p></div>`,
    lab:{ kind:'classify', id:'01.4',
      title:'Is it CUI?',
      objective:'Decide whether each data type is likely <b>CUI</b> (controlled but unclassified) or <b>Not CUI</b>. Knowing what triggers 800-171 is the first step to scoping a compliance program.',
      intro:'Five data types. Classify each. All correct completes the lab.',
      threeway:['CUI','Not CUI'],
      items:[
        {t:'Engineering drawings for a military vehicle component, marked controlled.',layer:'CUI'},
        {t:'The company\'s public marketing brochure.',layer:'Not CUI'},
        {t:'Export-controlled technical research performed under a federal contract.',layer:'CUI'},
        {t:'A press release already published on the company website.',layer:'Not CUI'},
        {t:'Personally identifiable information processed on behalf of a federal agency.',layer:'CUI'}
      ]},
    quiz:[
      {q:'SP 800-171 applies primarily to:',
       o:['Classified information on federal systems','CUI residing on non-federal (e.g., contractor) systems','Consumer credit card data','EU citizen personal data'],a:1,
       e:'800-171 exists to protect Controlled Unclassified Information when it lives outside federal systems, typically on contractor networks.'},
      {q:'How does 800-171 relate to 800-53?',
       o:['It is an unrelated standard','It is a distilled subset tailored for non-federal organizations','It supersedes 800-53','It is the EU equivalent'],a:1,
       e:'800-171 takes a focused subset of 800-53 controls and reorganizes them into requirements suited to organizations not running a full federal program.'},
      {q:'Which U.S. program verifies 800-171 compliance for defense contractors?',
       o:['FedRAMP','CMMC','PCI DSS','HIPAA'],a:1,
       e:'The Cybersecurity Maturity Model Certification (CMMC) assesses defense contractors largely against 800-171 requirements.'}
    ]},

  { id:'01.5', num:'01.5', title:'The ISO/IEC 27000 family', minutes:8,
    dek:'The international counterpart to NIST: 27001 certifies a management system, 27002 details the controls, 27005 governs risk.',
    concept:`<p>Outside the U.S. federal world, the dominant standard is the <b>ISO/IEC 27000 family</b> — international standards published jointly by ISO and IEC. Unlike NIST documents (free, U.S.-centric), ISO standards are paid, globally recognized, and <b>certifiable</b>: an accredited body can audit you and issue a certificate.</p>
    <div class="keyterm"><div class="kt-label">Standard 1</div><div class="kt-term">ISO/IEC 27001</div>The certifiable standard. It specifies the requirements for an <b>Information Security Management System (ISMS)</b> — the governance system for managing security risk. You get certified against 27001.</div>
    <div class="keyterm"><div class="kt-label">Standard 2</div><div class="kt-term">ISO/IEC 27002</div>The guidance companion. It describes the actual security <b>controls</b> in detail (the 2022 edition has 93 controls in 4 themes). You implement 27002 controls; you certify against 27001.</div>
    <div class="keyterm"><div class="kt-label">Standard 3</div><div class="kt-term">ISO/IEC 27005</div>Guidance specifically for <b>information security risk management</b> — how to identify, analyze, evaluate, and treat risk within the ISMS.</div>
    <h3>The ISMS mindset</h3>
    <p>The heart of 27001 is the <b>ISMS</b>: not a tool, but a management system — policies, processes, roles, and a cycle of continual improvement (Plan-Do-Check-Act). Certification proves you <i>manage</i> security systematically, not that any single control is perfect.</p>
    <div class="analogy"><div class="al">Think of it like</div>A restaurant's food-safety certification. The certificate on the wall (27001) doesn't mean every dish is flawless — it means there's a <i>system</i>: documented procedures, trained staff, temperature logs, and regular inspections (27002 is the detailed hygiene rules; 27005 is how they assess the risk of each dish).</div>
    <div class="callout tip"><span class="ic">💡</span><div>Quick memory hook: <b>27001 = certify</b> (the management system), <b>27002 = controls</b> (the how-to), <b>27005 = risk</b>. Mixing up 27001 and 27002 is the most common ISO confusion in interviews.</div></div>`,
    example:`<p>See the division of labor between the three standards on one finding.</p>
    <div class="example-wrap"><div class="example-label">Worked example · who owns what</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">isms-audit.log</div><div class="chip">ISO 27001</div></div>
    <div class="console-body"><div class="mono-out">scenario: laptops are not encrypted

<span style="color:#34d399">27005</span> RISK: lost laptop → CUI disclosure
        likelihood: med  impact: high  → treat
<span style="color:#34d399">27002</span> CONTROL: A.8.24 use of cryptography
        implement full-disk encryption on all laptops
<span style="color:#34d399">27001</span> ISMS: document the decision in the Statement of
        Applicability; auditor checks the system worked
        → if the management system is sound: <span style="color:#34d399">CERTIFIED</span></div></div></div>
    <p>27005 framed the risk, 27002 named the control, and 27001 is the management system the auditor certifies. The certificate attests to the <i>system</i>, evidenced by how it handled this exact finding.</p></div>`,
    lab:{ kind:'match', id:'01.5',
      title:'Match the ISO standard to its job',
      objective:'Match each ISO/IEC 27000 standard to what it actually does. Getting 27001 vs. 27002 straight is essential ISO literacy.',
      intro:'Match each standard to its role. All correct completes the lab.',
      pairs:[
        {l:'ISO/IEC 27001',r:'Certifiable ISMS requirements'},
        {l:'ISO/IEC 27002',r:'Detailed catalog of security controls'},
        {l:'ISO/IEC 27005',r:'Information security risk management guidance'},
        {l:'Statement of Applicability',r:'Document of which controls apply and why'}
      ]},
    quiz:[
      {q:'You can be formally certified against which ISO standard?',
       o:['27002','27005','27001','All of them equally'],a:2,
       e:'Certification is against 27001 (the ISMS). 27002 and 27005 are guidance documents you cannot certify against directly.'},
      {q:'What is an ISMS?',
       o:['A firewall appliance','An Information Security Management System — the governance system for managing security','A type of encryption','An incident database'],a:1,
       e:'The ISMS is the set of policies, processes, roles, and continual-improvement cycle that systematically manages information security risk.'},
      {q:'Which standard would you consult for the detailed wording of a specific control?',
       o:['27001','27002','27005','None'],a:1,
       e:'27002 is the guidance companion describing the controls in detail; 27001 references them but 27002 explains the how.'}
    ]},

  { id:'01.6', num:'01.6', title:'FAIR — quantitative risk', minutes:7,
    dek:'Most frameworks rate risk "High/Medium/Low." FAIR puts a dollar figure and a probability on it — turning risk into a number executives can act on.',
    concept:`<p>Every framework so far treats risk <b>qualitatively</b> — red/amber/green, high/moderate/low. <b>FAIR (Factor Analysis of Information Risk)</b> is different: it is a <b>quantitative</b> model that expresses risk in <i>financial terms and probabilities</i>.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">FAIR</div>An open, quantitative risk-analysis model that defines risk as the probable frequency and probable magnitude of future loss — expressed in money, not color codes.</div>
    <h3>The core decomposition</h3>
    <p>FAIR breaks <b>Risk</b> into two factors, then breaks those down further:</p>
    <ul>
      <li><b>Loss Event Frequency</b> — how often a loss is likely to occur (from Threat Event Frequency × Vulnerability).</li>
      <li><b>Loss Magnitude</b> — how much it costs when it does (primary loss + secondary loss).</li>
    </ul>
    <p>Multiply distributions of those together and you get a <b>range of probable annualized loss</b> — e.g., "we expect $1.2M in losses from this scenario per year, with a 90% chance it falls between $400K and $3M."</p>
    <div class="analogy"><div class="al">Think of it like</div>How an insurance company prices a policy. They don't say "house fire risk is High." They estimate how often fires happen (frequency) and how much each costs (magnitude), then set a premium. FAIR brings that actuarial discipline to cyber risk.</div>
    <div class="callout warn"><span class="ic">⚠️</span><div>FAIR is powerful but only as good as its inputs. Garbage estimates of frequency and magnitude produce confident-looking but meaningless dollar figures. Its real value is <i>forcing explicit assumptions</i> and enabling apples-to-apples comparison between risks.</div></div>`,
    example:`<p>Here's a FAIR analysis of one scenario, decomposed and rolled up to a loss figure.</p>
    <div class="example-wrap"><div class="example-label">Worked example · quantifying a phishing risk</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">fair-analysis.calc</div><div class="chip">QUANTITATIVE</div></div>
    <div class="console-body"><div class="mono-out">scenario: BEC phishing leads to fraudulent wire

LOSS EVENT FREQUENCY
  threat event frequency : 12 attempts / year
  vulnerability          : 5% succeed
  → loss event frequency : <span style="color:#34d399">0.6 events / year</span>

LOSS MAGNITUDE (per event)
  primary loss (wire)    : $250,000
  secondary (response)   : $50,000
  → magnitude            : <span style="color:#34d399">$300,000 / event</span>

ANNUALIZED RISK
  0.6 × $300,000 = <span style="color:#fbbf24">$180,000 / year (expected)</span>
  → now comparable to the cost of controls</div></div></div>
    <p>That single number — <b>$180K/year</b> — lets you weigh a $40K email-security control as obviously worth it, and compare this risk directly against an unrelated one measured the same way. That comparability is FAIR's superpower.</p></div>`,
    lab:{ kind:'order', id:'01.6',
      title:'Build the FAIR calculation',
      objective:'Order the steps of a FAIR analysis from raw factors to an annualized loss figure. Understanding the decomposition is the whole point of the model.',
      intro:'Arrange the FAIR steps from inputs to final risk figure, then check.',
      correct:['Estimate threat event frequency','Estimate vulnerability (% that succeed)','Derive loss event frequency','Estimate loss magnitude per event','Compute annualized loss exposure'],
      scrambled:['Estimate loss magnitude per event','Derive loss event frequency','Compute annualized loss exposure','Estimate threat event frequency','Estimate vulnerability (% that succeed)']},
    quiz:[
      {q:'How does FAIR express risk?',
       o:['As High/Medium/Low ratings','As probable frequency and magnitude of loss, in financial terms','As a control maturity tier','As a compliance pass/fail'],a:1,
       e:'FAIR is quantitative: it produces probabilities and dollar ranges of loss rather than qualitative color codes.'},
      {q:'The two top-level factors FAIR decomposes risk into are:',
       o:['Threats and vulnerabilities','Loss Event Frequency and Loss Magnitude','Likelihood and severity tiers','Confidentiality and integrity'],a:1,
       e:'FAIR splits risk into how often a loss occurs (Loss Event Frequency) and how costly it is (Loss Magnitude).'},
      {q:'What is the main caveat when using FAIR?',
       o:['It only works for physical security','Its output is only as good as the estimated inputs','It cannot compare risks','It is illegal in the EU'],a:1,
       e:'FAIR\'s dollar figures look precise but depend entirely on the quality of frequency and magnitude estimates; its value is in forcing explicit, comparable assumptions.'}
    ]}
  ]},
/* ============================ MODULE 02 ============================ */
{ id:'M02', num:'02', title:'Controls & Best Practices', sub:'4 lessons · the playbook',
  blurb:'The prescriptive, hands-on side: CIS Controls and Benchmarks for concrete hardening, OWASP for application security, and MITRE ATT&CK plus the Cyber Kill Chain for understanding the adversary.',
  lessons:[

  { id:'02.1', num:'02.1', title:'CIS Controls & Benchmarks', minutes:8,
    dek:'Where frameworks say "manage your assets," CIS says "here are the exact 18 things to do, in priority order, and here is how to configure each system."',
    concept:`<p>The <b>CIS Critical Security Controls</b> (currently <b>v8.1</b>), from the Center for Internet Security, are a prioritized, prescriptive set of defensive actions. Where NIST CSF tells you <i>what outcomes</i> to achieve, CIS tells you <i>exactly what to do</i> — and in what order.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">CIS Critical Security Controls</div>A prioritized set of 18 controls (each broken into specific Safeguards) representing the most effective defensive actions, ordered so that doing the first few blocks the majority of common attacks.</div>
    <h3>18 Controls, organized by priority</h3>
    <p>The first controls are deliberately the highest-impact. CIS Control 1 and 2 are <b>asset and software inventory</b> — because you cannot protect what you don't know you have. They run through access control, data protection, logging, incident response, and penetration testing.</p>
    <h3>Implementation Groups (IG1–IG3)</h3>
    <p>CIS scales by organization size and risk via <b>Implementation Groups</b>: <b>IG1</b> is essential cyber hygiene for small organizations; <b>IG2</b> and <b>IG3</b> add Safeguards for larger or higher-risk enterprises. IG1 is now often cited as the baseline definition of "reasonable" security.</p>
    <div class="keyterm"><div class="kt-label">Companion</div><div class="kt-term">CIS Benchmarks</div>Separate, deeply detailed configuration guides for specific technologies (Windows Server, Ubuntu, AWS, Apache). They tell you the exact setting values to harden a given system.</div>
    <div class="analogy"><div class="al">Think of it like</div>A doctor's advice. A framework says "stay healthy." The CIS Controls are the prioritized checklist — "first, sleep and eat well; then exercise; then advanced stuff." The CIS Benchmarks are the precise prescriptions — exact dosages and settings for each specific condition.</div>`,
    example:`<p>See the difference between a Control (what to do) and a Benchmark (the exact setting).</p>
    <div class="example-wrap"><div class="example-label">Worked example · Control vs. Benchmark</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">cis-hardening.txt</div><div class="chip">CIS v8.1</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#34d399">CIS CONTROL 5</span> — Account Management
  Safeguard 5.2: use unique, strong passwords
  Safeguard 5.3: disable dormant accounts
  (the "what" — applies to every system)

<span style="color:#34d399">CIS BENCHMARK</span> — Windows Server 2022
  1.1.1 'Enforce password history' = 24 passwords
  1.1.2 'Maximum password age'      = 365 days
  1.1.4 'Minimum password length'   = 14 chars
  (the "exact setting" — for this specific OS)</div></div></div>
    <p>The Control sets the objective; the Benchmark gives you the literal value to type into the policy editor. Together they take you from intent to a hardened machine with no guesswork.</p></div>`,
    lab:{ kind:'classify', id:'02.1',
      title:'Control or Benchmark?',
      objective:'Decide whether each item is a CIS <b>Control/Safeguard</b> (the general action) or a CIS <b>Benchmark</b> (a system-specific configuration value).',
      intro:'Five items. Classify each. All correct completes the lab.',
      threeway:['Control','Benchmark'],
      items:[
        {t:'"Maintain an inventory of all enterprise assets."',layer:'Control'},
        {t:'"Set \'Minimum password length\' to 14 characters on Windows Server 2022."',layer:'Benchmark'},
        {t:'"Establish and maintain a secure configuration process."',layer:'Control'},
        {t:'"Disable the S3 bucket public-access setting in AWS."',layer:'Benchmark'},
        {t:'"Implement and manage a firewall on servers."',layer:'Control'}
      ]},
    quiz:[
      {q:'Why are CIS Controls 1 and 2 (asset and software inventory) placed first?',
       o:['Alphabetical order','You cannot protect assets you do not know exist','They are the cheapest','Regulators require it'],a:1,
       e:'Inventory is foundational — visibility into what you have is a prerequisite for every other defensive action, so CIS prioritizes it first.'},
      {q:'What does Implementation Group 1 (IG1) represent?',
       o:['The most advanced controls for nation-state defense','Essential cyber hygiene; a baseline for smaller organizations','A certification level','A type of penetration test'],a:1,
       e:'IG1 is the essential-hygiene tier, increasingly treated as the floor for "reasonable" security; IG2 and IG3 add safeguards for larger/higher-risk orgs.'},
      {q:'A CIS Benchmark differs from a CIS Control because it:',
       o:['Is less detailed','Gives exact configuration values for a specific technology','Applies only to networks','Is not maintained by CIS'],a:1,
       e:'Benchmarks are technology-specific hardening guides with precise setting values; Controls are the general prioritized actions.'}
    ]},

  { id:'02.2', num:'02.2', title:'OWASP — application security', minutes:8,
    dek:'The reference point for securing software. The Top 10 names the most critical web app risks; ASVS and SAMM turn that awareness into a verifiable program.',
    concept:`<p>Frameworks like NIST and ISO mostly operate at the organizational level. <b>OWASP (the Open Worldwide Application Security Project)</b> zooms into the <b>software</b> itself — the vulnerabilities in the code and how to prevent them. It's an open community producing free, vendor-neutral resources.</p>
    <div class="keyterm"><div class="kt-label">Flagship</div><div class="kt-term">OWASP Top 10</div>An awareness document ranking the ten most critical web application security risks (e.g., Broken Access Control, Injection, Cryptographic Failures). Updated periodically; the most-cited security list in software.</div>
    <h3>Beyond the Top 10</h3>
    <p>The Top 10 is awareness, not a standard. Two other OWASP projects make application security <i>verifiable</i>:</p>
    <ul>
      <li><b>ASVS (Application Security Verification Standard)</b> — a detailed, testable list of security requirements at three levels of rigor. You verify an app <i>against</i> ASVS.</li>
      <li><b>SAMM (Software Assurance Maturity Model)</b> — a model for measuring and improving the maturity of your whole software-security <i>program</i>, from governance to operations.</li>
    </ul>
    <div class="analogy"><div class="al">Think of it like</div>Building safety. The <b>Top 10</b> is the poster of the most common causes of building collapse — awareness. <b>ASVS</b> is the detailed inspection checklist you verify a specific building against. <b>SAMM</b> measures how mature the construction <i>company's</i> safety practices are overall.</div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> "Broken Access Control" has topped the recent Top 10 — the same authorization failures from any IAM discussion, now in code. A user changing <code>/account?id=123</code> to <code>id=124</code> and seeing someone else's data is the canonical example.</div></div>`,
    example:`<p>Here is one Top 10 category shown as the vulnerability and its fix.</p>
    <div class="example-wrap"><div class="example-label">Worked example · A01 Broken Access Control</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">owasp-a01.log</div><div class="chip">OWASP TOP 10</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#f87171">VULNERABLE</span>
  GET /api/invoices/4821     (logged in as user A)
  server returns the invoice WITHOUT checking
  that invoice 4821 belongs to user A
  → user A edits URL to 4822 → sees user B's data
  category: <span style="color:#34d399">A01:2021 Broken Access Control</span>

<span style="color:#34d399">FIXED</span>
  server checks: invoice.owner == session.user
  if mismatch → 403 Forbidden
  + deny-by-default authorization on every endpoint</div></div></div>
    <p>The fix is an <b>authorization check on every request</b>, server-side, denying by default. OWASP's value is naming this pattern so teams recognize and prevent it consistently rather than rediscovering it after a breach.</p></div>`,
    lab:{ kind:'match', id:'02.2',
      title:'Match the OWASP resource to its purpose',
      objective:'Match each OWASP project to what it is for. Knowing which resource solves which problem is how you actually apply OWASP in a program.',
      intro:'Match each project to its role. All correct completes the lab.',
      pairs:[
        {l:'OWASP Top 10',r:'Awareness of the most critical web risks'},
        {l:'OWASP ASVS',r:'Testable verification requirements for an app'},
        {l:'OWASP SAMM',r:'Maturity model for a software-security program'},
        {l:'Broken Access Control',r:'A recent #1 Top 10 risk category'}
      ]},
    quiz:[
      {q:'The OWASP Top 10 is best described as:',
       o:['A certifiable standard','An awareness document of the most critical web app risks','A penetration testing tool','A compliance law'],a:1,
       e:'The Top 10 raises awareness of common, critical risks. For verifiable requirements you use ASVS; it is not itself a standard you certify against.'},
      {q:'If you want a testable list of security requirements to verify an application against, you use:',
       o:['The Top 10','ASVS','SAMM','FAIR'],a:1,
       e:'The Application Security Verification Standard (ASVS) provides leveled, testable requirements for verifying an application\'s security.'},
      {q:'SAMM measures the maturity of:',
       o:['A single line of code','An organization\'s overall software-security program','A firewall ruleset','A network segment'],a:1,
       e:'The Software Assurance Maturity Model assesses and helps improve the maturity of the whole software-security program.'}
    ]},

  { id:'02.3', num:'02.3', title:'MITRE ATT&CK', minutes:8,
    dek:'A giant, curated knowledge base of exactly how real adversaries behave — the tactics, techniques, and procedures defenders use to map detections and find gaps.',
    concept:`<p><b>MITRE ATT&CK</b> (Adversarial Tactics, Techniques, and Common Knowledge) is a free, continuously updated <b>knowledge base of real-world adversary behavior</b>, observed in actual intrusions and organized into a navigable matrix.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">MITRE ATT&CK</div>A curated matrix of the tactics (the adversary's goals) and techniques (how they achieve them) seen in real attacks, used by defenders to map coverage, build detections, and emulate threats.</div>
    <h3>Tactics and Techniques</h3>
    <ul>
      <li><b>Tactics</b> are the adversary's objectives — the columns of the matrix. Examples: Initial Access, Persistence, Privilege Escalation, Lateral Movement, Exfiltration.</li>
      <li><b>Techniques</b> are <i>how</i> they accomplish a tactic — the cells. E.g., under Initial Access: Phishing (T1566). Many techniques have sub-techniques.</li>
      <li><b>Procedures</b> are the specific, observed implementations a given threat group uses.</li>
    </ul>
    <h3>How defenders use it</h3>
    <p>ATT&CK turns abstract "we got hacked" into precise, shared vocabulary. Teams map their detections onto the matrix to see <b>coverage gaps</b> (a "heat map"), threat hunters look for specific techniques, and red teams emulate known groups.</p>
    <div class="analogy"><div class="al">Think of it like</div>A catalog of every move a burglar might use — pick the lock, climb the fire escape, tailgate through the lobby — organized by goal (get in, move around, take the loot). You can't guard everything equally, but the catalog lets you see which moves you'd detect and which you'd miss entirely.</div>
    <div class="callout warn"><span class="ic">⚠️</span><div>Don't confuse ATT&CK with the Cyber Kill Chain (next lesson). The Kill Chain is a simple <i>linear</i> 7-stage model; ATT&CK is a far more granular, non-linear <i>matrix</i> of hundreds of techniques. They complement each other.</div></div>`,
    example:`<p>Here is one intrusion described entirely in ATT&CK terms — the shared language in action.</p>
    <div class="example-wrap"><div class="example-label">Worked example · an intrusion in ATT&CK terms</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">attack-mapping.log</div><div class="chip">MITRE ATT&CK</div></div>
    <div class="console-body"><div class="mono-out">tactic                technique
---------------------------------------------------------
<span style="color:#34d399">Initial Access</span>        Phishing: Spearphishing Link (T1566.002)
<span style="color:#34d399">Execution</span>             User Execution: Malicious File (T1204.002)
<span style="color:#34d399">Persistence</span>           Registry Run Keys (T1547.001)
<span style="color:#34d399">Privilege Escalation</span>  Valid Accounts (T1078)
<span style="color:#34d399">Lateral Movement</span>      Remote Services: RDP (T1021.001)
<span style="color:#34d399">Exfiltration</span>          Exfil Over C2 Channel (T1041)

detection coverage: <span style="color:#34d399">4 / 6 techniques</span> have alerts
gap: T1547.001 and T1078 → <span style="color:#f87171">no detection</span></div></div></div>
    <p>Mapping the intrusion reveals a concrete, prioritized to-do list: build detections for the two uncovered techniques. That gap analysis is ATT&CK's most practical payoff.</p></div>`,
    lab:{ kind:'classify', id:'02.3',
      title:'Tactic or Technique?',
      objective:'Distinguish ATT&CK <b>Tactics</b> (the adversary\'s goal) from <b>Techniques</b> (how they achieve it). This is the fundamental structure of the matrix.',
      intro:'Five items. Classify each as a Tactic or a Technique. All correct completes the lab.',
      threeway:['Tactic','Technique'],
      items:[
        {t:'Initial Access',layer:'Tactic'},
        {t:'Spearphishing Link',layer:'Technique'},
        {t:'Lateral Movement',layer:'Tactic'},
        {t:'Registry Run Keys for persistence',layer:'Technique'},
        {t:'Exfiltration',layer:'Tactic'}
      ]},
    quiz:[
      {q:'In ATT&CK, a "Tactic" represents:',
       o:['A specific tool','The adversary\'s objective (the "why")','A patch','A compliance control'],a:1,
       e:'Tactics are the adversary\'s goals (e.g., Persistence, Exfiltration) — the columns of the matrix. Techniques are the "how".'},
      {q:'A primary defensive use of ATT&CK is:',
       o:['Encrypting data at rest','Mapping detection coverage to find gaps','Writing privacy policies','Calculating annualized loss'],a:1,
       e:'Teams map their detections onto the matrix to visualize coverage and prioritize building detections for uncovered techniques.'},
      {q:'How does ATT&CK differ from the Cyber Kill Chain?',
       o:['They are identical','ATT&CK is a granular, non-linear matrix; the Kill Chain is a simple linear model','ATT&CK is older','The Kill Chain has more techniques'],a:1,
       e:'The Kill Chain is a 7-stage linear model; ATT&CK is a far more detailed, non-linear matrix of hundreds of techniques. They complement each other.'}
    ]},

  { id:'02.4', num:'02.4', title:'The Cyber Kill Chain', minutes:6,
    dek:'Lockheed Martin\'s elegant 7-stage model of an intrusion — the mental model that frames defense as "break the chain at any link."',
    concept:`<p>The <b>Cyber Kill Chain</b>, developed by Lockheed Martin, models a targeted intrusion as a <b>linear sequence of seven stages</b>. Its enduring insight: an attacker must complete <i>every</i> stage to succeed, so a defender who disrupts <i>any one</i> stage breaks the chain and stops the attack.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">Cyber Kill Chain</div>A seven-stage model of a cyber intrusion — Reconnaissance, Weaponization, Delivery, Exploitation, Installation, Command &amp; Control, Actions on Objectives — used to frame detection and disruption at each stage.</div>
    <h3>The seven stages</h3>
    <ol>
      <li><b>Reconnaissance</b> — research the target.</li>
      <li><b>Weaponization</b> — build the malware/exploit payload.</li>
      <li><b>Delivery</b> — send it (email, USB, web).</li>
      <li><b>Exploitation</b> — trigger the vulnerability.</li>
      <li><b>Installation</b> — establish a foothold (malware installed).</li>
      <li><b>Command &amp; Control (C2)</b> — remote channel back to the attacker.</li>
      <li><b>Actions on Objectives</b> — steal, encrypt, destroy.</li>
    </ol>
    <div class="analogy"><div class="al">Think of it like</div>A heist movie. Case the joint (recon), build the tools (weaponize), get inside (delivery/exploitation), set up a hideout (installation), stay in radio contact (C2), then crack the safe (actions). Stop them at <i>any</i> step — a guard at the door, a jammed radio — and the heist fails.</div>
    <div class="callout tip"><span class="ic">💡</span><div>The Kill Chain's strength is its simplicity for <i>communication and strategy</i>: "we have strong Delivery controls (email filtering) but weak C2 detection." For granular technical detail, defenders pair it with MITRE ATT&CK.</div></div>`,
    example:`<p>One phishing-led ransomware case, mapped to the chain, showing where each control would break it.</p>
    <div class="example-wrap"><div class="example-label">Worked example · breaking the chain</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">kill-chain.map</div></div>
    <div class="console-body"><div class="mono-out">stage                 control that breaks it here
----------------------------------------------------------
Reconnaissance        limit public employee info
Weaponization         (attacker side — hard to disrupt)
Delivery              <span style="color:#34d399">email filtering / attachment sandbox</span>
Exploitation          patching / EDR exploit protection
Installation          <span style="color:#34d399">application allowlisting</span>
Command & Control     egress filtering / DNS monitoring
Actions on Objectives offline backups / DLP

defense-in-depth: <span style="color:#34d399">multiple links covered</span>
→ attacker must beat ALL of them to succeed</div></div></div>
    <p>This is why the model endures: it makes <b>defense-in-depth</b> concrete. Each layer is another link the attacker must break, and you only need <i>one</i> to hold.</p></div>`,
    lab:{ kind:'order', id:'02.4',
      title:'Sequence the Kill Chain',
      objective:'Put the seven Cyber Kill Chain stages in the correct order. The sequence is the model — recognizing where an attack is on the chain tells you what comes next.',
      intro:'The stages are shuffled. Order them, then check.',
      correct:['Reconnaissance','Weaponization','Delivery','Exploitation','Installation','Command & Control','Actions on Objectives'],
      scrambled:['Delivery','Reconnaissance','Installation','Weaponization','Actions on Objectives','Exploitation','Command & Control']},
    quiz:[
      {q:'The core defensive insight of the Kill Chain is:',
       o:['Attackers only need one stage','Disrupting any single stage breaks the entire attack','Recon is impossible to stop','C2 is always the first stage'],a:1,
       e:'Because the attacker must complete every stage, a defender who breaks any one link stops the intrusion — the basis for defense-in-depth.'},
      {q:'Which stage involves the attacker establishing a remote channel to control the compromised host?',
       o:['Delivery','Command & Control (C2)','Reconnaissance','Weaponization'],a:1,
       e:'Command & Control is the persistent channel back to the attacker, typically established after installation and before final actions.'},
      {q:'Compared to MITRE ATT&CK, the Kill Chain is:',
       o:['More granular','A simpler, linear, strategic model','A compliance standard','A control catalog'],a:1,
       e:'The Kill Chain is a high-level linear model good for strategy and communication; ATT&CK provides the granular technique-level detail.'}
    ]}
  ]},
/* ============================ MODULE 03 ============================ */
{ id:'M03', num:'03', title:'Governance, Audit & Maturity', sub:'3 lessons · the oversight layer',
  blurb:'How organizations govern, prove, and measure security: COBIT for IT governance, SOC 2 for demonstrating trust to customers, and the CMMC / C2M2 maturity models.',
  lessons:[

  { id:'03.1', num:'03.1', title:'COBIT — IT governance', minutes:7,
    dek:'The framework that connects the boardroom to the server room — governing enterprise IT so technology actually serves business goals.',
    concept:`<p><b>COBIT (Control Objectives for Information and Related Technologies)</b>, from ISACA, is a framework for the <b>governance and management of enterprise IT</b>. It sits a level above security: it governs <i>all</i> of IT to ensure technology delivers business value while managing risk and resources.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">COBIT</div>A governance framework that aligns enterprise IT with business objectives, distinguishing governance (board-level direction and oversight) from management (planning, building, running, monitoring).</div>
    <h3>Governance vs. Management</h3>
    <p>COBIT's signature distinction: <b>governance</b> is the board's job — set direction, evaluate options, monitor performance (COBIT's "EDM" domain: Evaluate, Direct, Monitor). <b>Management</b> executes within that direction across four domains: Align/Plan/Organize, Build/Acquire/Implement, Deliver/Service/Support, and Monitor/Evaluate/Assess.</p>
    <div class="analogy"><div class="al">Think of it like</div>A company's board vs. its executives. The <b>board (governance)</b> sets strategy and holds management accountable; the <b>executives (management)</b> run day-to-day operations to deliver on that strategy. COBIT formalizes that split specifically for IT.</div>
    <h3>Where it fits</h3>
    <p>COBIT is broader than security frameworks — it's frequently used to satisfy <b>IT general controls</b> for audits like SOX, and to give executives a governance structure that security frameworks (CSF, ISO) then plug into.</p>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> A common pattern: COBIT provides the overarching IT governance, ISO 27001 or NIST CSF handles the security management within it, and CIS Controls supply the concrete technical safeguards. Frameworks nest.</div></div>`,
    example:`<p>One IT decision, split into its governance and management responsibilities the COBIT way.</p>
    <div class="example-wrap"><div class="example-label">Worked example · governance vs. management</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">cobit-split.log</div><div class="chip">COBIT</div></div>
    <div class="console-body"><div class="mono-out">decision: adopt a new cloud ERP platform

<span style="color:#34d399">GOVERNANCE (board / EDM)</span>
  Evaluate : does this align with strategy & risk appetite?
  Direct   : approve budget, set risk tolerance
  Monitor  : review benefits realized vs. promised

<span style="color:#34d399">MANAGEMENT (execs / APO,BAI,DSS,MEA)</span>
  Align/Plan : build the migration roadmap
  Build      : implement & configure the ERP
  Deliver    : run support & service desk
  Monitor    : measure performance against SLAs</div></div></div>
    <p>The board doesn't configure the ERP, and the implementation team doesn't set risk appetite. COBIT keeps those responsibilities cleanly separated so accountability is never ambiguous.</p></div>`,
    lab:{ kind:'classify', id:'03.1',
      title:'Governance or Management?',
      objective:'Sort each IT activity into COBIT\'s <b>Governance</b> (board-level direction/oversight) or <b>Management</b> (execution) bucket.',
      intro:'Five activities. Classify each. All correct completes the lab.',
      threeway:['Governance','Management'],
      items:[
        {t:'The board sets the enterprise risk appetite for technology investments.',layer:'Governance'},
        {t:'The IT team configures and deploys the new system.',layer:'Management'},
        {t:'Directors evaluate whether an initiative aligns with business strategy.',layer:'Governance'},
        {t:'The service desk resolves user tickets under an SLA.',layer:'Management'},
        {t:'The board monitors whether promised benefits were actually realized.',layer:'Governance'}
      ]},
    quiz:[
      {q:'COBIT\'s primary scope is:',
       o:['Only network security','Governance and management of enterprise IT as a whole','Application code review','Physical security'],a:1,
       e:'COBIT governs all of enterprise IT to align it with business goals — broader than any single security framework.'},
      {q:'In COBIT, "governance" is primarily the responsibility of:',
       o:['The help desk','The board / governing body (Evaluate, Direct, Monitor)','External auditors','End users'],a:1,
       e:'Governance (the EDM domain) is the board\'s role: evaluate options, direct via decisions, and monitor outcomes. Management executes.'},
      {q:'How does COBIT typically relate to ISO 27001 or NIST CSF?',
       o:['They are mutually exclusive','COBIT provides overarching IT governance that security frameworks plug into','COBIT replaces them','They cannot be used together'],a:1,
       e:'Frameworks nest: COBIT governs IT broadly while security-specific frameworks manage security within that governance structure.'}
    ]},

  { id:'03.2', num:'03.2', title:'SOC 2', minutes:8,
    dek:'The report a service company hands customers to prove "you can trust us with your data" — built on the AICPA\'s five Trust Services Criteria.',
    concept:`<p><b>SOC 2 (System and Organization Controls 2)</b> is an attestation report defined by the <b>AICPA</b> (the U.S. accounting body). When a SaaS or cloud vendor wants to prove to customers that it handles their data securely, it undergoes a SOC 2 audit and shares the resulting report.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">SOC 2</div>An independent auditor's attestation that a service organization's controls meet the AICPA Trust Services Criteria, used to give customers assurance about how their data is handled.</div>
    <h3>The five Trust Services Criteria</h3>
    <ul>
      <li><b>Security</b> — the only mandatory criterion (the "common criteria"). Protection against unauthorized access.</li>
      <li><b>Availability</b> — the system is available for operation as agreed.</li>
      <li><b>Processing Integrity</b> — processing is complete, accurate, and timely.</li>
      <li><b>Confidentiality</b> — confidential information is protected.</li>
      <li><b>Privacy</b> — personal information is handled per the privacy notice.</li>
    </ul>
    <p>You always include Security; you add the others based on what's relevant to your service.</p>
    <h3>Type I vs. Type II</h3>
    <p>A <b>Type I</b> report assesses whether controls are <i>suitably designed</i> at a single point in time. A <b>Type II</b> assesses whether they <i>operated effectively</i> over a period (typically 3–12 months). Type II is far more valuable and what serious customers demand.</p>
    <div class="analogy"><div class="al">Think of it like</div>A restaurant's health inspection. <b>Type I</b> = the inspector confirms the kitchen is <i>set up</i> correctly today. <b>Type II</b> = the inspector reviews months of temperature logs to confirm it was run correctly <i>the whole time</i>. The second tells you much more.</div>`,
    example:`<p>How a SOC 2 engagement is scoped and what the report concludes.</p>
    <div class="example-wrap"><div class="example-label">Worked example · scoping a SOC 2 Type II</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">soc2-engagement.log</div><div class="chip">AICPA</div></div>
    <div class="console-body"><div class="mono-out">org      : a B2B payroll SaaS company
criteria : <span style="color:#34d399">Security</span> (required)
           + <span style="color:#34d399">Availability</span> (they promise 99.9% uptime)
           + <span style="color:#34d399">Confidentiality</span> (they hold client salary data)
           — Privacy: excluded (no direct consumer PII role)
type     : <span style="color:#34d399">Type II</span> — 9-month observation window
auditor tests controls over the period...
  access reviews performed quarterly   <span style="color:#34d399">✓</span>
  change management followed            <span style="color:#34d399">✓</span>
  one exception: a delayed deprovision  <span style="color:#fbbf24">⚠ noted</span>
opinion  : <span style="color:#34d399">unqualified (clean), with one noted exception</span></div></div></div>
    <p>The company chose three criteria relevant to its service, ran a Type II window, and earned a clean opinion despite a minor noted exception. Customers read this report instead of auditing the vendor themselves.</p></div>`,
    lab:{ kind:'classify', id:'03.2',
      title:'Which Trust Services Criterion?',
      objective:'Map each control objective to the SOC 2 Trust Services Criterion it supports. This is how a SOC 2 program organizes its controls.',
      intro:'Five objectives. Classify each. All correct completes the lab.',
      threeway:['Security','Availability','Processing Integrity','Confidentiality'],
      items:[
        {t:'Enforce MFA and least privilege to prevent unauthorized access.',layer:'Security'},
        {t:'Maintain redundant infrastructure to meet a 99.9% uptime commitment.',layer:'Availability'},
        {t:'Validate that financial transactions are processed completely and accurately.',layer:'Processing Integrity'},
        {t:'Encrypt and restrict access to client data marked confidential.',layer:'Confidentiality'},
        {t:'Monitor and alert on intrusion attempts against production systems.',layer:'Security'}
      ]},
    quiz:[
      {q:'Which Trust Services Criterion is always required in a SOC 2?',
       o:['Privacy','Availability','Security','Processing Integrity'],a:2,
       e:'Security (the "common criteria") is mandatory in every SOC 2; the other four are added based on relevance to the service.'},
      {q:'A SOC 2 Type II report differs from Type I because it:',
       o:['Costs less','Tests whether controls operated effectively over a period of time','Only checks design at one point in time','Is not performed by an auditor'],a:1,
       e:'Type I assesses control design at a point in time; Type II assesses operating effectiveness over a period (often 3–12 months) — more rigorous and more valued.'},
      {q:'Who defines the SOC 2 framework?',
       o:['NIST','ISO','The AICPA','MITRE'],a:2,
       e:'SOC 2 is defined by the AICPA, the American Institute of Certified Public Accountants, and performed by CPA firms.'}
    ]},

  { id:'03.3', num:'03.3', title:'Maturity models — CMMC & C2M2', minutes:7,
    dek:'Frameworks tell you what to do; maturity models tell you how good you are at it — measuring capability on a tiered scale you can improve over time.',
    concept:`<p>A <b>maturity model</b> measures <i>how well and how consistently</i> an organization performs its security practices, on a tiered scale. Two prominent examples: <b>CMMC</b> (mandatory for U.S. defense contractors) and <b>C2M2</b> (voluntary, energy-sector roots, broadly applicable).</p>
    <div class="keyterm"><div class="kt-label">Model 1</div><div class="kt-term">CMMC (Cybersecurity Maturity Model Certification)</div>A U.S. Department of Defense program that <b>certifies</b> defense contractors at tiered levels, largely verifying NIST SP 800-171 implementation, to protect CUI across the defense supply chain.</div>
    <div class="keyterm"><div class="kt-label">Model 2</div><div class="kt-term">C2M2 (Cybersecurity Capability Maturity Model)</div>A voluntary self-evaluation model (originating in the U.S. energy sector) that scores practices across domains on Maturity Indicator Levels, used to benchmark and prioritize improvement.</div>
    <h3>Why maturity, not just compliance</h3>
    <p>Compliance is binary — you meet a control or you don't. <b>Maturity</b> captures the difference between "we did it once" and "we do it consistently, measure it, and improve it." A practice can be <i>present but immature</i>.</p>
    <div class="analogy"><div class="al">Think of it like</div>Learning an instrument. Compliance asks "can you play the song?" Maturity asks "can you play it reliably, sight-read new ones, and teach others?" Same activity, very different levels of capability — and only the higher levels survive pressure.</div>
    <div class="callout warn"><span class="ic">⚠️</span><div>CMMC is <b>certified by a third party</b> at higher levels and tied to contract eligibility — failing it can mean losing defense work. C2M2 is a <b>voluntary self-assessment</b>. Same "maturity" idea, very different stakes and mechanics.</div></div>`,
    example:`<p>One practice — access reviews — scored across maturity levels to show what "more mature" actually means.</p>
    <div class="example-wrap"><div class="example-label">Worked example · the same practice at rising maturity</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">maturity-ladder.txt</div><div class="chip">MATURITY</div></div>
    <div class="console-body"><div class="mono-out">practice: reviewing who has access to systems

Level 1  <span style="color:#f87171">performed ad hoc</span>
         "we review access when we remember to"
Level 2  <span style="color:#fbbf24">documented & planned</span>
         "we have a policy; reviews happen quarterly"
Level 3  <span style="color:#34d399">managed & measured</span>
         "reviews are tracked, metrics reported,
          process improved each cycle"

higher level = survives staff turnover & audits
            = real, repeatable capability</div></div></div>
    <p>The activity never changes — it's "review access." What changes is whether it's a heroic one-off or an institutionalized, measured process. Maturity models make that distinction explicit and improvable.</p></div>`,
