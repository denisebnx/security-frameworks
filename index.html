/* ============================ MODULE 04 ============================ */
{ id:'M04', num:'04', title:'Regulatory & Compliance', sub:'5 lessons · the law layer',
  blurb:'The standards that carry the force of law or contract: PCI DSS for payment cards, HIPAA for health data, the U.S. financial and federal rules (GLBA, SOX, FISMA, FedRAMP), and the global privacy and resilience regimes (GDPR, CCPA, DORA, NIS2).',
  lessons:[

  { id:'04.1', num:'04.1', title:'PCI DSS — payment cards', minutes:7,
    dek:'Not a law but a contractual mandate from the card brands: if you touch cardholder data, you meet these requirements or you lose the ability to process cards.',
    concept:`<p><b>PCI DSS (Payment Card Industry Data Security Standard)</b> governs any organization that stores, processes, or transmits <b>cardholder data</b>. It's not government law — it's a <b>contractual standard</b> enforced by the major card brands (Visa, Mastercard, etc.) through the banks. Break it and you can be fined or cut off from card processing.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">PCI DSS</div>A contractual security standard for protecting payment card data, built around 12 requirements (now organized under v4.0), enforced by the card brands rather than by law.</div>
    <h3>The 12 requirements (high level)</h3>
    <p>They cluster into goals: build and maintain a secure network, protect cardholder data (encryption, no storing the CVV), manage vulnerabilities, implement strong access control, monitor and test networks, and maintain a security policy. A central theme is <b>minimizing the cardholder data environment (CDE)</b> — the fewer systems that touch card data, the smaller your scope.</p>
    <div class="analogy"><div class="al">Think of it like</div>The rules a shopping mall imposes on its stores to accept the mall's gift card. The mall (card brands) isn't the government, but if you want to take the card, you follow their security rules — or you can't be a tenant. Scope reduction is like keeping the cash in one locked room instead of every register.</div>
    <div class="callout tip"><span class="ic">💡</span><div>The fastest way to reduce PCI scope is to <b>not store card data at all</b> — use a tokenization provider or hosted payment page so card numbers never touch your systems. Less data held = less to protect = smaller, cheaper assessment.</div></div>`,
    example:`<p>How scope reduction changes a merchant's PCI burden.</p>
    <div class="example-wrap"><div class="example-label">Worked example · shrinking the cardholder data environment</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">pci-scope.log</div><div class="chip">PCI DSS v4.0</div></div>
    <div class="console-body"><div class="mono-out"><span style="color:#f87171">BEFORE</span> — store card numbers in own database
  CDE = web servers + app + database + backups
  every system in scope for all 12 requirements
  assessment: large, costly, high breach risk

<span style="color:#34d399">AFTER</span> — use a tokenization gateway
  card number never touches merchant systems
  merchant stores only a meaningless token
  CDE shrinks dramatically → <span style="color:#34d399">scope minimized</span>
  (still in scope, but far less to secure)</div></div></div>
    <p>Same business, radically smaller compliance footprint. The lesson PCI teaches everyone: <b>the safest data is the data you never hold.</b></p></div>`,
    lab:{ kind:'classify', id:'04.1',
      title:'In scope or out of scope?',
      objective:'Decide whether each system is likely <b>in the cardholder data environment</b> (PCI in-scope) or <b>out of scope</b>. Scoping is the foundational PCI skill.',
      intro:'Five systems. Classify each. All correct completes the lab.',
      threeway:['In Scope','Out of Scope'],
      items:[
        {t:'A database that stores full payment card numbers.',layer:'In Scope'},
        {t:'The corporate cafeteria menu web page on an isolated network.',layer:'Out of Scope'},
        {t:'A payment application that processes live card transactions.',layer:'In Scope'},
        {t:'An HR system holding only employee records, fully segmented from payments.',layer:'Out of Scope'},
        {t:'A server that transmits cardholder data to the processor.',layer:'In Scope'}
      ]},
    quiz:[
      {q:'PCI DSS is enforced by:',
       o:['The U.S. federal government','The card brands via contractual obligations','The European Union','ISO'],a:1,
       e:'PCI DSS is a contractual standard enforced by the payment card brands and acquiring banks, not a government law.'},
      {q:'The most effective way to reduce PCI DSS scope is to:',
       o:['Hire more auditors','Avoid storing/handling card data (e.g., tokenization)','Encrypt the office Wi-Fi','Buy cyber insurance'],a:1,
       e:'Removing card data from your environment via tokenization or hosted payment pages shrinks the cardholder data environment and your obligations.'},
      {q:'"CDE" in PCI DSS stands for:',
       o:['Card Data Encryption','Cardholder Data Environment','Compliance Defense Engine','Central Data Exchange'],a:1,
       e:'The Cardholder Data Environment is the set of systems that store, process, or transmit card data — the scope of the assessment.'}
    ]},

  { id:'04.2', num:'04.2', title:'HIPAA & HITECH — healthcare', minutes:7,
    dek:'The U.S. law protecting health information — and the act that gave it teeth, mandating breach notification and raising the penalties.',
    concept:`<p><b>HIPAA (Health Insurance Portability and Accountability Act)</b> is the U.S. law governing the protection of <b>Protected Health Information (PHI)</b>. Its <b>Security Rule</b> mandates administrative, physical, and technical safeguards for electronic PHI; its <b>Privacy Rule</b> governs use and disclosure.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">HIPAA</div>A U.S. law requiring covered entities (and their business associates) to protect Protected Health Information through Privacy and Security Rules, with safeguards across administrative, physical, and technical domains.</div>
    <div class="keyterm"><div class="kt-label">Key terms</div><div class="kt-term">PHI · Covered Entity · Business Associate</div><b>PHI</b> is individually identifiable health information. A <b>Covered Entity</b> is a provider, health plan, or clearinghouse. A <b>Business Associate</b> is a vendor that handles PHI on their behalf (e.g., a cloud host) — bound by a Business Associate Agreement (BAA).</div>
    <h3>HITECH — the enforcement upgrade</h3>
    <p>The <b>HITECH Act (2009)</b> strengthened HIPAA: it introduced the mandatory <b>Breach Notification Rule</b> (you must notify affected individuals, HHS, and sometimes the media), increased penalties, and extended direct liability to business associates.</p>
    <div class="analogy"><div class="al">Think of it like</div>HIPAA is the rulebook for handling a patient's diary; HITECH is the amendment that added "and if you lose the diary, you must announce it publicly and pay a steep fine." The notification requirement changed behavior more than the original rules did.</div>
    <div class="callout warn"><span class="ic">⚠️</span><div>The safeguards are split into <b>Required</b> and <b>Addressable</b>. "Addressable" does <i>not</i> mean optional — it means you implement it, or document a justified reason and an equivalent alternative. Treating "addressable" as "ignore" is a classic compliance failure.</div></div>`,
    example:`<p>One vendor relationship, mapped to HIPAA roles and the safeguard that applies.</p>
    <div class="example-wrap"><div class="example-label">Worked example · roles and safeguards</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">hipaa-roles.log</div><div class="chip">HIPAA / HITECH</div></div>
    <div class="console-body"><div class="mono-out">a clinic uses a cloud EHR vendor

clinic       = <span style="color:#34d399">Covered Entity</span>
cloud vendor = <span style="color:#34d399">Business Associate</span> → needs a BAA
data         = patient records = <span style="color:#34d399">PHI (ePHI)</span>

SECURITY RULE safeguards in play:
  Administrative : workforce training, risk analysis
  Physical       : datacenter access controls
  Technical      : encryption of ePHI (addressable),
                   audit logs, access controls

HITECH: laptop with ePHI is stolen unencrypted
  → <span style="color:#f87171">Breach Notification Rule triggers</span>
  → notify individuals + HHS (+ media if 500+)</div></div></div>
    <p>The encryption was "addressable" — and skipping it turned a lost laptop into a reportable breach. HITECH's notification rule is what makes that omission so costly.</p></div>`,
    lab:{ kind:'match', id:'04.2',
      title:'Match the HIPAA term to its meaning',
      objective:'Match each HIPAA/HITECH concept to its definition. These terms are the vocabulary of every healthcare security conversation.',
      intro:'Match each term to its meaning. All correct completes the lab.',
      pairs:[
        {l:'PHI',r:'Individually identifiable health information'},
        {l:'Covered Entity',r:'A provider, health plan, or clearinghouse'},
        {l:'Business Associate',r:'A vendor handling PHI on an entity\'s behalf'},
        {l:'HITECH Breach Notification',r:'Duty to disclose breaches of unsecured PHI'}

    quiz:[
      {q:'What did the HITECH Act add to HIPAA?',
       o:['It repealed the Privacy Rule','Mandatory breach notification, higher penalties, BA liability','Coverage for payment cards','EU jurisdiction'],a:1,
       e:'HITECH introduced the Breach Notification Rule, raised penalties, and made business associates directly liable.'},
      {q:'An "addressable" HIPAA safeguard means:',
       o:['Completely optional','Implement it, or document why not and use an equivalent alternative','Required only for hospitals','Already handled by HITECH'],a:1,
       e:'Addressable safeguards must be implemented unless you document a reasonable justification and an equivalent measure — not simply skipped.'},
      {q:'A cloud vendor that stores a clinic\'s patient records is a:',
       o:['Covered Entity','Business Associate','Clearinghouse','Data Subject'],a:1,
       e:'A vendor handling PHI on behalf of a covered entity is a Business Associate and must sign a Business Associate Agreement (BAA).'}
    ]},

  { id:'04.3', num:'04.3', title:'U.S. financial & federal: GLBA, SOX, FISMA, FedRAMP', minutes:8,
    dek:'Four U.S. regimes that govern money and government: protecting customer financial data, ensuring accurate financial reporting, and securing federal systems and the clouds they use.',
    concept:`<p>Four distinct U.S. laws/programs cluster around finance and the federal government. They're often confused, so the key is knowing <i>what each one protects</i>.</p>
    <div class="keyterm"><div class="kt-label">Finance 1</div><div class="kt-term">GLBA (Gramm-Leach-Bliley Act)</div>Requires financial institutions to protect customers' <b>nonpublic personal information</b>; its <b>Safeguards Rule</b> mandates a written information security program.</div>
    <div class="keyterm"><div class="kt-label">Finance 2</div><div class="kt-term">SOX (Sarbanes-Oxley Act)</div>Requires public companies to ensure the <b>integrity and accuracy of financial reporting</b>. Section 404 drives IT general controls over systems that touch financial data.</div>
    <div class="keyterm"><div class="kt-label">Federal 1</div><div class="kt-term">FISMA (Federal Information Security Modernization Act)</div>Requires U.S. <b>federal agencies</b> to secure their information systems — implemented largely through the NIST RMF and SP 800-53.</div>
    <div class="keyterm"><div class="kt-label">Federal 2</div><div class="kt-term">FedRAMP</div>A standardized program for authorizing <b>cloud services used by the federal government</b> — "do it once, use it many times" cloud security authorization.</div>
    <h3>The unifying thread</h3>
    <p><b>GLBA</b> = protect customer financial data. <b>SOX</b> = protect the truthfulness of financial statements. <b>FISMA</b> = secure federal agency systems. <b>FedRAMP</b> = secure the clouds those agencies buy.</p>
    <div class="analogy"><div class="al">Think of it like</div>Four different guards. GLBA guards your bank account details. SOX guards the company's published numbers. FISMA guards the government's own computers. FedRAMP vets the outside contractors (clouds) before the government lets them in the building.</div>`,
    example:`<p>One scenario touching all four, to keep them straight.</p>
    <div class="example-wrap"><div class="example-label">Worked example · who governs what</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">us-regimes.map</div></div>
    <div class="console-body"><div class="mono-out">a publicly-traded bank that sells SaaS to a US agency

protect customers' account info ......... <span style="color:#34d399">GLBA</span>
ensure quarterly financials are accurate. <span style="color:#34d399">SOX</span>
the federal agency secures its systems .. <span style="color:#34d399">FISMA</span>
the bank's cloud must be authorized to
  sell to that agency .................... <span style="color:#34d399">FedRAMP</span>

note: FISMA + FedRAMP both lean on
      <span style="color:#fbbf24">NIST RMF + SP 800-53</span> under the hood</div></div></div>
    <p>Different targets, overlapping machinery. Both federal regimes run on the NIST RMF and 800-53 you learned in Module 1 — frameworks reused as the engine of law.</p></div>`,
    lab:{ kind:'match', id:'04.3',
      title:'Match the regime to what it protects',
      objective:'Match each U.S. regime to the thing it is designed to protect. This is the single most useful way to keep these four apart.',
      intro:'Match each law/program to its purpose. All correct completes the lab.',
      pairs:[
        {l:'GLBA',r:'Customers\' nonpublic financial information'},
        {l:'SOX',r:'Accuracy of public-company financial reporting'},
        {l:'FISMA',r:'Security of federal agency information systems'},
        {l:'FedRAMP',r:'Authorization of cloud services for federal use'}
      ]},
    quiz:[
      {q:'The GLBA Safeguards Rule requires financial institutions to:',
       o:['Publish their source code','Maintain a written information security program protecting customer data','Use a specific cloud vendor','Report to the EU'],a:1,
       e:'GLBA\'s Safeguards Rule mandates a documented information security program to protect customers\' nonpublic personal information.'},
      {q:'SOX is primarily concerned with:',
       o:['Health records','The integrity and accuracy of public-company financial reporting','Payment cards','Federal clouds'],a:1,
       e:'Sarbanes-Oxley targets the truthfulness of financial statements; its Section 404 drives IT general controls over financial systems.'},
      {q:'FedRAMP\'s "authorize once, use many times" model applies to:',
       o:['Individual user accounts','Cloud services sold to the federal government','Physical badges','Credit card terminals'],a:1,
       e:'FedRAMP standardizes the security authorization of cloud services for federal use so one authorization can be reused across agencies.'}
    ]},

  { id:'04.4', num:'04.4', title:'Global privacy: GDPR & CCPA/CPRA', minutes:8,
    dek:'The laws that gave individuals rights over their own data. GDPR set the global template from Europe; California\'s CCPA/CPRA leads the U.S. patchwork.',
    concept:`<p>Privacy law shifted the question from "is the data secure?" to "does the <i>individual</i> have rights over it?" The <b>GDPR</b> (EU) is the landmark; <b>CCPA/CPRA</b> (California) is the most influential U.S. equivalent.</p>
    <div class="keyterm"><div class="kt-label">Global benchmark</div><div class="kt-term">GDPR (General Data Protection Regulation)</div>The EU regulation governing processing of personal data of people in the EU. It grants data-subject rights (access, erasure, portability), requires a lawful basis to process, mandates breach notification (72 hours), and carries fines up to 4% of global annual revenue.</div>
    <div class="keyterm"><div class="kt-label">U.S. leader</div><div class="kt-term">CCPA / CPRA</div>California's privacy laws giving consumers rights to know, delete, correct, and opt out of the sale/sharing of their personal information. The CPRA expanded the CCPA and created a dedicated enforcement agency.</div>
    <h3>Key GDPR concepts</h3>
    <ul>
      <li><b>Controller vs. Processor</b> — the controller decides why/how data is processed; the processor acts on the controller's instructions.</li>
      <li><b>Lawful basis</b> — you need a valid reason to process (consent, contract, legitimate interest, etc.).</li>
      <li><b>Data-subject rights</b> — access, rectification, erasure ("right to be forgotten"), portability, objection.</li>
      <li><b>Extraterritorial reach</b> — it applies to anyone processing EU residents' data, wherever the company is.</li>
    </ul>
    <div class="analogy"><div class="al">Think of it like</div>Your data as your personal property that companies borrow. GDPR says they need a valid reason to borrow it, must tell you what they're doing, must give it back or destroy it on request, and must confess quickly if they lose it. CCPA gives Californians a strong version of those same property rights.</div>
    <div class="callout warn"><span class="ic">⚠️</span><div>Security ≠ privacy. You can hold data perfectly <i>securely</i> and still violate <i>privacy</i> law by collecting it without a lawful basis or ignoring a deletion request. Privacy regimes regulate the <i>right to process</i>, not just the protection.</div></div>`,
    example:`<p>One data-subject request, handled the GDPR way.</p>
    <div class="example-wrap"><div class="example-label">Worked example · a "right to erasure" request</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">gdpr-dsar.log</div><div class="chip">GDPR</div></div>
    <div class="console-body"><div class="mono-out">EU resident emails: "delete all my data"

1. verify identity of the data subject
2. role check: are we <span style="color:#34d399">controller</span> or processor?
   → controller: we must act + instruct processors
3. locate personal data across all systems
4. check for overriding lawful basis to retain
   (e.g., legal obligation to keep invoices)
5. erase what isn't legally required to keep
6. respond within <span style="color:#34d399">one month</span>

failure to honor → complaint to a DPA →
  potential fine up to <span style="color:#f87171">4% global revenue</span></div></div></div>
    <p>Notice step 4: erasure isn't absolute — a competing lawful basis (like tax-record retention) can override it. Privacy law is a balance of rights, not a single rule.</p></div>`,
    lab:{ kind:'classify', id:'04.4',
      title:'Controller or Processor?',
      objective:'Classify each party as a GDPR <b>Controller</b> (decides why/how data is processed) or <b>Processor</b> (acts on the controller\'s instructions). This role split drives who is responsible for what.',
      intro:'Five parties. Classify each. All correct completes the lab.',
      threeway:['Controller','Processor'],
      items:[
        {t:'An online retailer that decides to collect customer data for marketing.',layer:'Controller'},
        {t:'A cloud email provider that stores messages on the retailer\'s behalf.',layer:'Processor'},
        {t:'A hospital deciding what patient data to gather and why.',layer:'Controller'},
        {t:'A payroll SaaS that processes employee data per its client\'s instructions.',layer:'Processor'},
        {t:'A bank determining the purposes for processing account holders\' data.',layer:'Controller'}
      ]},
    quiz:[
      {q:'GDPR\'s breach notification deadline to the supervisory authority is generally:',
       o:['Immediately','72 hours','30 days','1 year'],a:1,
       e:'Controllers must notify the relevant supervisory authority within 72 hours of becoming aware of a personal-data breach, where feasible.'},
      {q:'The "right to be forgotten" is also known as the right to:',
       o:['Portability','Erasure','Rectification','Access'],a:1,
       e:'The right to erasure ("right to be forgotten") lets data subjects request deletion of their personal data, subject to certain limits.'},
      {q:'A company can be fully compliant on data security yet still violate GDPR by:',
       o:['Using encryption','Processing personal data without a lawful basis','Backing up data','Training staff'],a:1,
       e:'Privacy law regulates the right to process; collecting or using data without a lawful basis violates GDPR regardless of how securely it is stored.'}
    ]},

  { id:'04.5', num:'04.5', title:'EU resilience & infrastructure: DORA, NIS2, NERC CIP', minutes:8,
    dek:'The newest wave: rules that go beyond data to mandate operational resilience for financial firms, baseline security for essential services, and protection of the power grid.',
    concept:`<p>Recent regulation has shifted from protecting <i>data</i> to guaranteeing <i>resilience</i> of critical services. Three regimes lead this wave.</p>
    <div class="keyterm"><div class="kt-label">EU finance</div><div class="kt-term">DORA (Digital Operational Resilience Act)</div>An EU regulation (applicable since Jan 2025) requiring financial entities to withstand, respond to, and recover from ICT-related disruptions. Covers ICT risk management, incident reporting, resilience testing, and oversight of critical third-party ICT providers.</div>
    <div class="keyterm"><div class="kt-label">EU essential services</div><div class="kt-term">NIS2 Directive</div>An EU directive expanding cybersecurity obligations across "essential" and "important" entities (energy, transport, health, digital infra, and more), mandating risk-management measures, incident reporting, and management accountability.</div>
    <div class="keyterm"><div class="kt-label">North American grid</div><div class="kt-term">NERC CIP</div>Mandatory Critical Infrastructure Protection standards for the North American <b>bulk electric system</b> — protecting the power grid, with enforceable penalties.</div>
    <h3>The common theme: keep running</h3>
    <p>These don't just ask "is the data safe?" They ask "can this <b>essential service keep operating</b> and recover when attacked?" DORA stress-tests financial firms' resilience; NIS2 raises the security floor for critical sectors and puts <i>executives</i> on the hook; NERC CIP keeps the lights on.</p>
    <div class="analogy"><div class="al">Think of it like</div>Building codes for earthquakes rather than locks on doors. It's not only "keep burglars out" (data protection) — it's "ensure the hospital, the bank, and the power station <i>stay standing and functioning</i> when the ground shakes." Resilience, not just confidentiality.</div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> A standout DORA feature is oversight of <b>critical third-party ICT providers</b> (think major cloud platforms). Regulators recognized that if everyone's bank runs on the same few clouds, those clouds become systemic risk — and brought them into scope.</div></div>`,
    example:`<p>The same incident type, seen through each regime's distinct lens.</p>
    <div class="example-wrap"><div class="example-label">Worked example · three regimes, three concerns</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">resilience-lens.txt</div></div>
    <div class="console-body"><div class="mono-out">event: a major cloud outage hits critical services

<span style="color:#34d399">DORA</span> (an EU bank on that cloud)
  → was resilience tested? incident reported?
    is this critical ICT provider under oversight?
<span style="color:#34d399">NIS2</span> (an EU hospital / energy firm affected)
  → risk-mgmt measures in place? reported in time?
    is management held accountable?
<span style="color:#34d399">NERC CIP</span> (a North American grid operator)
  → are bulk-electric-system assets protected &
    recoverable? enforceable penalties apply</div></div></div>
    <p>One technical event, three regulatory questions — all about <b>continuity and accountability</b>, not just data confidentiality. That's the signature of the resilience era.</p></div>`,
    lab:{ kind:'classify', id:'04.5',
      title:'Which resilience regime applies?',
      objective:'Map each scenario to the regime that primarily governs it: <b>DORA</b> (EU finance), <b>NIS2</b> (EU essential/important entities), or <b>NERC CIP</b> (North American grid).',
      intro:'Five scenarios. Classify each. All correct completes the lab.',
      threeway:['DORA','NIS2','NERC CIP'],
      items:[
        {t:'An EU investment bank must prove it can recover from an ICT disruption and report incidents.',layer:'DORA'},

{ id:'M05', num:'05', title:'Cloud & Specialized', sub:'3 lessons · the frontier',
  blurb:'Where the perimeter dissolves and the machines get physical: the CSA Cloud Controls Matrix and STAR for cloud assurance, ISO 27017/27018 for cloud security and privacy, and IEC 62443 for industrial control systems.',
  lessons:[

  { id:'05.1', num:'05.1', title:'CSA Cloud Controls Matrix & STAR', minutes:7,
    dek:'The cloud industry\'s own answer to "how do we trust a cloud provider?" — a cloud-specific control framework and a public registry of who meets it.',
    concept:`<p>The <b>Cloud Security Alliance (CSA)</b> produces cloud-specific assurance resources. Its flagship is the <b>Cloud Controls Matrix (CCM)</b>, paired with the <b>STAR</b> registry that publishes providers' assessments.</p>
    <div class="keyterm"><div class="kt-label">Framework</div><div class="kt-term">CSA Cloud Controls Matrix (CCM)</div>A cybersecurity control framework purpose-built for cloud computing, organized into domains, with each control mapped to other standards (ISO 27001, NIST, PCI DSS) so one assessment shows compliance across many.</div>
    <div class="keyterm"><div class="kt-label">Registry</div><div class="kt-term">CSA STAR (Security, Trust, Assurance &amp; Risk)</div>A public registry where cloud providers publish their security posture — Level 1 (self-assessment) and Level 2 (third-party audit) — so customers can evaluate them without a custom questionnaire.</div>
    <h3>The shared responsibility model</h3>
    <p>Cloud's defining concept is <b>shared responsibility</b>: the provider secures the cloud <i>infrastructure</i>; the customer secures what they put <i>in</i> it (their data, configurations, access). The exact line shifts between IaaS, PaaS, and SaaS. The CCM helps clarify which controls belong to whom.</p>
    <div class="analogy"><div class="al">Think of it like</div>Renting an apartment. The landlord (provider) secures the building structure, the main door locks, and fire systems. You (customer) lock your own unit, don't leave valuables in the hallway, and decide who gets a key. Most cloud breaches are the tenant leaving the door open — misconfiguration — not the building failing.</div>
    <div class="callout tip"><span class="ic">💡</span><div>The CCM's superpower is its <b>mappings</b>: one CCM control links to the equivalent ISO 27001, NIST, and PCI controls. Assess once against the CCM and demonstrate alignment with multiple frameworks at once — a huge efficiency for cloud providers.</div></div>`,
    example:`<p>The shared responsibility line, drawn across service models.</p>
    <div class="example-wrap"><div class="example-label">Worked example · who secures what</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">shared-responsibility.map</div><div class="chip">CSA CCM</div></div>
    <div class="console-body"><div class="mono-out">layer            IaaS        PaaS        SaaS
-----------------------------------------------------
data & access    <span style="color:#34d399">customer</span>    <span style="color:#34d399">customer</span>    <span style="color:#34d399">customer</span>
application      <span style="color:#34d399">customer</span>    shared      provider
OS / runtime     <span style="color:#34d399">customer</span>    provider    provider
virtualization   provider    provider    provider
physical infra   provider    provider    provider

constant across every model:
  <span style="color:#fbbf24">your data and your identities are ALWAYS yours</span></div></div></div>
    <p>Notice the top row never changes: <b>data and access management are always the customer's job</b>, no matter the service model. That single insight prevents the most common cloud breaches.</p></div>`,
    lab:{ kind:'classify', id:'05.1',
      title:'Whose responsibility? (IaaS)',
      objective:'In an <b>IaaS</b> deployment, decide whether each task belongs to the <b>Customer</b> or the cloud <b>Provider</b> under the shared responsibility model.',
      intro:'Five tasks in an IaaS scenario. Classify each. All correct completes the lab.',
      threeway:['Customer','Provider'],
      items:[
        {t:'Patching the guest operating system on a virtual machine.',layer:'Customer'},
        {t:'Physically securing the data center and its hardware.',layer:'Provider'},
        {t:'Configuring identity and access permissions for the workload.',layer:'Customer'},
        {t:'Maintaining the hypervisor and virtualization layer.',layer:'Provider'},
        {t:'Classifying and encrypting the application\'s data.',layer:'Customer'}
      ]},
    quiz:[
      {q:'Under the cloud shared responsibility model, which is ALWAYS the customer\'s responsibility?',
       o:['Physical data center security','Their own data and access management','The hypervisor','The building\'s power supply'],a:1,
       e:'Across IaaS, PaaS, and SaaS, the customer always owns their data and identity/access management; lower layers shift to the provider.'},
      {q:'What is the main benefit of the CCM\'s control mappings?',
       o:['They hide controls from auditors','One CCM assessment demonstrates alignment with multiple frameworks','They replace all other standards','They only apply to SaaS'],a:1,
       e:'Each CCM control maps to equivalents in ISO, NIST, PCI, etc., so assessing once shows compliance across many frameworks.'},
      {q:'A CSA STAR Level 2 entry indicates:',
       o:['A self-assessment only','A third-party audit of the provider\'s posture','A government certification','A penetration test'],a:1,
       e:'STAR Level 1 is a self-assessment; Level 2 reflects an independent third-party audit, offering stronger assurance.'}
    ]},

  { id:'05.2', num:'05.2', title:'ISO/IEC 27017 & 27018 — cloud security & privacy', minutes:7,
    dek:'Two focused extensions of the ISO 27000 family that adapt its controls to the specific realities of cloud computing and cloud-held personal data.',
    concept:`<p>The base ISO 27001/27002 controls weren't written with cloud in mind. Two extensions fill that gap: <b>ISO/IEC 27017</b> for cloud <i>security</i> and <b>ISO/IEC 27018</b> for cloud <i>privacy</i>. Both build directly on 27002.</p>
    <div class="keyterm"><div class="kt-label">Cloud security</div><div class="kt-term">ISO/IEC 27017</div>A code of practice that gives cloud-specific security guidance — additional controls and implementation guidance for both cloud providers and cloud customers, clarifying shared responsibilities.</div>
    <div class="keyterm"><div class="kt-label">Cloud privacy</div><div class="kt-term">ISO/IEC 27018</div>A code of practice for protecting <b>personally identifiable information (PII)</b> in public clouds acting as PII processors — covering consent, transparency, and limits on using customer data.</div>
    <h3>How they extend the family</h3>
    <p>These aren't standalone. They layer on top of an ISO 27001 ISMS: you implement 27002's controls, then add 27017's cloud-security guidance and 27018's PII-protection guidance where relevant. They make explicit things the base standards leave generic — like the division of duties between provider and tenant.</p>
    <div class="analogy"><div class="al">Think of it like</div>A general driving manual (27002) versus add-on guides for driving a specific vehicle. <b>27017</b> is "how these rules apply when you're operating in the cloud." <b>27018</b> is "the extra rules when your cargo is other people's personal belongings." Same foundation, specialized supplements.</div>
    <div class="callout real"><span class="ic">🛰️</span><div><b>From the field:</b> A major cloud provider will often hold ISO 27001 certification <i>and</i> advertise alignment with 27017 and 27018, signaling "we manage security systematically, we've addressed cloud-specific risks, and we protect the personal data you store with us."</div></div>`,
    example:`<p>One control area shown at each layer of the ISO stack.</p>
    <div class="example-wrap"><div class="example-label">Worked example · layering the cloud extensions</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">iso-cloud-stack.txt</div><div class="chip">ISO 27017/18</div></div>
    <div class="console-body"><div class="mono-out">topic: handling customer data in a public cloud

<span style="color:#34d399">27001</span> ISMS requires you manage information
       security risk systematically (certifiable)
<span style="color:#34d399">27002</span> base control: cryptography, access control
<span style="color:#34d399">27017</span> cloud add-on: clarify who manages keys,
       segregation in shared/virtual environments
<span style="color:#34d399">27018</span> PII add-on: don't use customer PII for
       your own advertising; support data return
       & deletion; be transparent about subcontractors

result: a cloud service that is secure AND
        privacy-respecting, provably so</div></div></div>
    <p>Each layer adds specificity the one below it lacked. The base ISMS proves you're systematic; the extensions prove you've handled the cloud's particular hazards.</p></div>`,
    lab:{ kind:'match', id:'05.2',
      title:'Match the ISO standard to its focus',
      objective:'Match each ISO standard to its specific role across the security and cloud stack. This cements how the cloud extensions relate to the base family.',
      intro:'Match each standard to its focus. All correct completes the lab.',
      pairs:[
        {l:'ISO/IEC 27001',r:'Certifiable ISMS requirements'},
        {l:'ISO/IEC 27002',r:'Baseline security control guidance'},
        {l:'ISO/IEC 27017',r:'Cloud-specific security guidance'},
        {l:'ISO/IEC 27018',r:'Protecting PII in public clouds'}
      ]},
    quiz:[
      {q:'ISO/IEC 27018 specifically addresses:',
       o:['Industrial control systems','Protection of personal data (PII) in public clouds','Payment card data','Federal authorization'],a:1,
       e:'27018 is a code of practice for protecting PII when a public cloud acts as a PII processor — the cloud-privacy extension.'},
      {q:'ISO/IEC 27017 and 27018 are best described as:',
       o:['Replacements for ISO 27001','Cloud-focused extensions that build on the ISO 27000 family','Unrelated U.S. laws','Maturity models'],a:1,
       e:'They are codes of practice that layer cloud-security (27017) and cloud-privacy (27018) guidance on top of the base ISO 27001/27002 framework.'},
      {q:'A practical privacy guidance in 27018 is that a cloud provider should:',
       o:['Use customer PII for its own advertising','Not use customer PII for its own marketing without consent','Sell PII to subcontractors','Delete all logs'],a:1,
       e:'27018 restricts a processor from using customers\' PII for its own purposes (like advertising) without consent, among other transparency and control measures.'}
    ]},

  { id:'05.3', num:'05.3', title:'IEC 62443 — industrial & OT security', minutes:8,
    dek:'Securing the systems that run factories, pipelines, and power plants — where a cyber failure can stop production or endanger lives, and "just patch it" isn\'t an option.',
    concept:`<p>Almost everything so far protects <b>IT</b> — data and business systems. <b>IEC 62443</b> protects <b>OT (Operational Technology)</b>: the <b>Industrial Automation and Control Systems (IACS)</b> that physically run factories, refineries, water treatment, and the grid.</p>
    <div class="keyterm"><div class="kt-label">Core definition</div><div class="kt-term">IEC 62443</div>A series of international standards for the security of Industrial Automation and Control Systems (IACS/OT), addressing people, processes, and technology across asset owners, integrators, and product suppliers.</div>
    <h3>Why OT is different from IT</h3>
    <ul>
      <li><b>Priorities flip.</b> IT prioritizes confidentiality first; OT prioritizes <b>availability and safety</b> first — a stopped turbine or a tripped safety system can hurt people.</li>
      <li><b>You can't just patch.</b> Systems run 24/7 for years; a reboot may halt production. Decades-old equipment may be unpatchable.</li>
      <li><b>Physical consequences.</b> A breach can cause explosions, blackouts, or contaminated water — not just data loss.</li>
    </ul>
    <h3>Key concepts</h3>
    <p>IEC 62443 introduces <b>Zones and Conduits</b> (segment the network into security zones, control the conduits between them) and <b>Security Levels (SL 1–4)</b> describing resistance from casual to nation-state-level attackers. It assigns responsibilities across <b>asset owners, system integrators, and product suppliers</b>.</p>
    <div class="analogy"><div class="al">Think of it like</div>Securing a hospital's life-support machines versus its email server. You cannot "reboot to install updates" on a ventilator mid-use, and a failure isn't an inconvenience — it's a life-safety event. OT security plans around uptime and physical safety in a way office IT never has to.</div>
    <div class="callout danger"><span class="ic">🛑</span><div>The reason OT security is urgent: real incidents (Stuxnet, attacks on power grids and water systems) proved that cyber attacks can cause <b>physical destruction and threaten public safety</b>. The stakes are measured in lives and infrastructure, not just records.</div></div>`,
    example:`<p>The IT-vs-OT mindset shift, and how 62443 segments a plant.</p>
    <div class="example-wrap"><div class="example-label">Worked example · zones, conduits & flipped priorities</div>
    <div class="console"><div class="console-bar"><div class="dots"><i style="background:#f87171"></i><i style="background:#fbbf24"></i><i style="background:#34d399"></i></div><div class="title">iec62443-plant.map</div><div class="chip">IEC 62443</div></div>
    <div class="console-body"><div class="mono-out">priority order:
  IT  : <span style="color:#34d399">Confidentiality</span> > Integrity > Availability
  OT  : <span style="color:#34d399">Availability/Safety</span> > Integrity > Confidentiality

plant segmentation (Zones & Conduits):
  [Enterprise IT zone]
        |  conduit (tightly controlled, monitored)
  [DMZ / data historian]
        |  conduit
  [Control zone: PLCs, SCADA]  ← SL-3 target
        |  conduit
  [Safety zone: SIS]           ← <span style="color:#f87171">SL-4, most isolated</span>

rule: a breach in IT must NOT reach the safety zone</div></div></div>
    <p>The segmentation exists so a compromise of the office network can't cascade into the systems that keep the plant — and its workers — safe. That containment is the heart of IEC 62443.</p></div>`,
    lab:{ kind:'classify', id:'05.3',
      title:'IT priority or OT priority?',
      objective:'Classify each statement as reflecting a traditional <b>IT</b> security mindset or an <b>OT</b> (industrial) security mindset. The mindset flip is the core lesson of IEC 62443.',
      intro:'Five statements. Classify each. All correct completes the lab.',
      threeway:['IT mindset','OT mindset'],
      items:[
        {t:'"Confidentiality of data is our top concern; we can tolerate brief downtime."',layer:'IT mindset'},
        {t:'"We cannot reboot to patch — keeping the process running and safe comes first."',layer:'OT mindset'},
        {t:'"A failure here could cause a physical explosion or endanger workers."',layer:'OT mindset'},
        {t:'"We push security patches automatically every month during business hours."',layer:'IT mindset'},
        {t:'"Equipment runs 24/7 for a decade and may be too old to patch at all."',layer:'OT mindset'}
      ]},
    quiz:[
      {q:'IEC 62443 primarily secures:',
       o:['Consumer mobile apps','Industrial Automation and Control Systems (OT)','Payment card networks','Email servers'],a:1,
       e:'IEC 62443 is the standard series for securing Industrial Automation and Control Systems — the operational technology running physical processes.'},
      {q:'How do OT security priorities typically differ from IT?',
       o:['They are identical','OT puts availability and safety first, ahead of confidentiality','OT ignores integrity','OT cares only about confidentiality'],a:1,
       e:'In OT, keeping the physical process available and safe usually outranks confidentiality — the reverse of traditional IT priorities.'},
      {q:'"Zones and Conduits" in IEC 62443 are used to:',
       o:['Encrypt email','Segment the network so a breach cannot reach critical/safety systems','Replace passwords','Calculate financial loss'],a:1,
       e:'Zones group assets by security need and conduits control traffic between them, containing breaches and protecting the most critical (e.g., safety) zones.'}
    ]}
  ]}
];

const TOTAL_LESSONS=CURRICULUM.reduce((a,m)=>a+m.lessons.length,0);
</script>

<script>
/* =====================================================================
   RENDER ENGINE
   ===================================================================== */
const ABOUT_LINKEDIN='https://www.linkedin.com/in/cyber-denise';

function buildRail(){
  const r=$('#railScroll');r.innerHTML='';
  const about=el(`<div class="mod about-mod" data-mod="ABOUT">
    <div class="mod-head">
      <div class="mod-num">00</div>
      <div class="mod-meta"><div class="t">About Denise Banks</div><div class="s">who built this &amp; why</div></div>
      <div class="mod-chev">★</div>
    </div></div>`);
  about.querySelector('.mod-head').onclick=()=>renderAbout();
  r.appendChild(about);
  CURRICULUM.forEach(mod=>{
    const locked=mod.locked;
    const m=el(`<div class="mod ${locked?'locked':''}" data-mod="${mod.id}">
      <div class="mod-head">
        <div class="mod-num">${mod.num}</div>
        <div class="mod-meta"><div class="t">${mod.title}</div><div class="s">${mod.sub}</div></div>
        ${locked?'<div class="mod-chev">🔒</div>':'<div class="mod-status"></div><div class="mod-chev">▸</div>'}
      </div>
      <div class="lessons"></div></div>`);
    const head=m.querySelector('.mod-head');
    const lc=m.querySelector('.lessons');
    mod.lessons.forEach(les=>{
      const li=el(`<div class="lesson" data-lesson="${les.id}" data-mod="${mod.id}">
        <span class="ln">${les.num}</span><span class="lt">${les.title}</span>
        <svg class="tick" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3.5L13 4.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`);
      li.onclick=e=>{e.stopPropagation();openLesson(mod.id,les.id);};
      lc.appendChild(li);
    });
    head.onclick=()=>{m.classList.toggle('open');};
    r.appendChild(m);
  });
  $('#totalCount').textContent=TOTAL_LESSONS;
}

/* ---------- About / bio page ---------- */
function renderAbout(){
  CURRENT=null;
  $$('.lesson').forEach(l=>l.classList.remove('active'));
  $$('.mod').forEach(m=>m.classList.remove('active-mod'));
  const am=$('.about-mod');if(am)am.classList.add('active-mod');
  $('#stage').scrollTop=0;
  $('#stageInner').innerHTML=`
    <div class="about-wrap">
      <div class="eyebrow">Module 00 · About</div>
      <h1 class="about-h1">About Denise Banks</h1>
      <div class="about-card">
        <div class="about-badge">DB</div>
        <div class="about-body">
          <div class="about-name">Denise Banks</div>
          <div class="about-role">Information Security Governance Professional</div>
          <p>I'm an Information Security Governance professional teaching myself the major cybersecurity frameworks and standards from the ground up. I came up through the operations side of security as an Information Security Analyst before moving into governance, risk, and compliance, so I've worked both the hands-on, day-to-day defense of systems and the policy and oversight side. Frameworks and standards sit right at the intersection of the two, and I wanted to build real depth in how they actually get selected, implemented, and audited.</p>
          <p>So rather than just read the standards, I took a practical approach: I built my own sandbox. <b>Frameworks Academy</b> is a self-contained, interactive learning environment where I work through the five essential groups of frameworks and standards — risk management frameworks like NIST CSF, the RMF, and ISO 27000; the controls and best practices of CIS, OWASP, MITRE ATT&amp;CK, and the Kill Chain; governance, audit, and maturity models like COBIT, SOC 2, and CMMC; the regulatory and compliance regimes from PCI DSS and HIPAA to GDPR, DORA, and NIS2; and the cloud and specialized standards including the CSA CCM, ISO 27017/27018, and IEC 62443.</p>
          <p>Every lesson follows the same loop: learn a concept, study a worked example, complete a graded lab, then pass a checkpoint quiz, so the knowledge is applied, not just memorized. It mirrors the real decisions a governance professional makes day to day. Building it has deepened my understanding far more than reading alone ever could, and it doubles as a living portfolio of the skills I'm developing.</p>
          <p>If you currently work in the GRC or security space, this is me showing my work. I'd love to connect.</p>
          <p class="about-linkedin"><a href="${ABOUT_LINKEDIN}" target="_blank" rel="noopener noreferrer">🔗 linkedin.com/in/cyber-denise</a></p>
        </div>
      </div>
      <div class="about-actions">
        <button class="btn" id="aboutStart">Explore the curriculum →</button>
        <button class="btn ghost" id="aboutResume">Resume the labs</button>
      </div>
    </div>`;
  const s=$('#aboutStart');if(s)s.onclick=()=>renderHome();
  const rb=$('#aboutResume');if(rb)rb.onclick=()=>{const t=resumeTarget();if(t)openLesson(t.modId,t.lessonId);};
}

/* ---------- welcome dashboard ---------- */
function firstIncompleteLesson(){
  const flat=flatLessons();
  const hit=flat.find(x=>!STATE.done.has('L:'+x.lessonId));
  return hit||flat[0];
}
function resumeTarget(){
  if(STATE.last){
    const m=CURRICULUM.find(x=>x.id===STATE.last.modId);
    const l=m&&m.lessons.find(y=>y.id===STATE.last.lessonId);
    if(l) return {modId:m.id,lessonId:l.id,mod:m,les:l};
  }
  return firstIncompleteLesson();
}
function renderHome(){
  CURRENT=null;
  $$('.lesson').forEach(l=>l.classList.remove('active'));
  $$('.mod').forEach(m=>m.classList.remove('active-mod'));
  const tracks=CURRICULUM.map(m=>{
    const live=!m.locked&&m.lessons.length;
    const doneN=m.lessons.filter(l=>STATE.done.has('L:'+l.id)).length;
    const complete=live&&doneN===m.lessons.length;
    return `<div class="track-card ${m.locked?'soon':''}" ${live?`data-open="${m.id}"`:''}>
      <div class="tn">Module ${m.num}${complete?' · ✓':''}</div><h3>${m.title}</h3><p>${m.blurb}</p>
      <div class="meta"><span>${m.lessons.length?m.lessons.length+' lessons':'in development'}</span>${live?`<span>${doneN}/${m.lessons.length} done</span>`:''}</div></div>`;
  }).join('');
  const lessonsDone=flatLessons().filter(x=>STATE.done.has('L:'+x.lessonId)).length;
  const hasProgress=lessonsDone>0||STATE.xp>0;
  const rt=resumeTarget();
  const resumeVerb=hasProgress?'Resume where you left off':'Start the course';
  const resumeWhat=rt?`Module ${rt.mod.num} · Lesson ${rt.les.num} — ${rt.les.title}`:'';
  const storageNote=storageAvailable()
    ? `<span class="pill" title="Your progress saves automatically in this browser">💾 progress saves automatically</span>`
    : `<span class="pill" style="border-color:#5c4a1a;color:#f5d98a" title="This browser is blocking storage, so progress will reset on reload">⚠ progress won't persist in this browser</span>`;
  $('#stageInner').innerHTML=`
    <div class="hero">
      <div class="eyebrow">Cybersecurity Frameworks &amp; Standards · Track 1</div>
      <h1>Learn the frameworks by using them.</h1>
      <p>No experience needed. You'll move through numbered lessons that teach a concept, show a worked example in a simulated console, drop you into a hands-on lab, then check your understanding — building real, portfolio-ready fluency in the standards that run modern security.</p>
    </div>

    <div class="resume-card" id="resumeCard">
      <div class="resume-main">
        <div class="resume-label">${hasProgress?'Welcome back':'Ready to begin'}</div>
        <div class="resume-title">${resumeVerb}</div>
        <div class="resume-sub">${resumeWhat}</div>
        ${hasProgress?`<div class="resume-prog"><div class="resume-prog-bar"><i style="width:${(lessonsDone/TOTAL_LESSONS*100).toFixed(1)}%"></i></div><span>${lessonsDone} / ${TOTAL_LESSONS} lessons · Level ${levelFromXp(STATE.xp)} · ${STATE.xp} XP</span></div>`:''}
      </div>
      <button class="btn resume-btn" id="resumeBtn">${hasProgress?'Resume →':'Start lesson 01.1 →'}</button>
    </div>
    <div class="pill-set" style="margin:-2px 0 22px;align-items:center">
      ${storageNote}
      ${hasProgress?`<button class="pill reset-pill" id="resetBtn" title="Clear all saved progress">↺ reset progress</button>`:''}
    </div>

    <div class="stat-strip">
      <div class="stat-box"><div class="v">${lessonsDone}</div><div class="l">lessons done</div></div>
      <div class="stat-box"><div class="v">${TOTAL_LESSONS}</div><div class="l">total lessons</div></div>
      <div class="stat-box"><div class="v" id="homeXp">${STATE.xp}</div><div class="l">your XP</div></div>
      <div class="stat-box"><div class="v">${STATE.badges.size}</div><div class="l">badges</div></div>
    </div>
    <h2 style="font-family:var(--disp);font-size:22px;letter-spacing:-.4px;margin:30px 0 4px">The curriculum</h2>
    <p style="color:var(--ink-dim);margin:0 0 8px">${CURRICULUM.length} modules, ${TOTAL_LESSONS} lessons. Each lesson runs Concept → Example → Lab → Checkpoint. Pick up anywhere — your place is saved automatically.</p>
    <div class="track-grid">${tracks}</div>
    <div class="callout tip" style="margin-top:18px"><span class="ic">🧭</span><div><b>How to use this:</b> work top to bottom, or jump to any module. Finishing labs and quizzes earns XP, levels, and badges. Your progress is stored in this browser, so you can close the tab and come back later right where you left off.</div></div>`;
  const rb=$('#resumeBtn');if(rb)rb.onclick=()=>{const t=resumeTarget();if(t)openLesson(t.modId,t.lessonId);};
  const rs=$('#resetBtn');if(rs)rs.onclick=()=>{
    if(window.confirm('Reset all progress? This clears completed lessons, XP, and badges in this browser. This cannot be undone.')){
      resetState();addXp(0);refreshProgressUI();renderHome();toast('↺','Progress reset','Starting fresh — good luck.');
    }
  };
  $$('.track-card[data-open]').forEach(c=>c.onclick=()=>{const mid=c.dataset.open;const mod=CURRICULUM.find(x=>x.id===mid);
    const firstUndone=mod.lessons.find(l=>!STATE.done.has('L:'+l.id))||mod.lessons[0];
    openLesson(mid,firstUndone.id);
    const mEl=$(`.mod[data-mod="${mid}"]`);if(mEl)mEl.classList.add('open');});
}

/* ---------- open a lesson ---------- */
function openLesson(modId,lessonId){
  const mod=CURRICULUM.find(m=>m.id===modId);
  const lesson=mod.lessons.find(l=>l.id===lessonId);
  if(!lesson)return;
  CURRENT={modId,lessonId};
  STATE.last={modId,lessonId};saveState();
  $$('.mod').forEach(m=>m.classList.remove('active-mod'));
  $$('.lesson').forEach(l=>l.classList.toggle('active',l.dataset.lesson===lessonId&&l.dataset.mod===modId));
  const mEl=$(`.mod[data-mod="${modId}"]`);if(mEl&&!mEl.classList.contains('open'))mEl.classList.add('open');
  $('#stage').scrollTop=0;

  const stepData=[
    {k:'concept',label:'Concept',sub:'learn'},
    {k:'example',label:'Example',sub:'see it'},
    {k:'lab',label:'Lab',sub:'do it'},
    {k:'quiz',label:'Checkpoint',sub:'prove it'}
  ];
  $('#stageInner').innerHTML=`
    <div class="crumb">Module <b>${mod.num}</b> · ${mod.title} <span style="opacity:.5">/</span> Lesson <b>${lesson.num}</b></div>
    <div class="lesson-hd">
      <div class="eyebrow">Lesson ${lesson.num} · ~${lesson.minutes} min</div>
      <h1 class="title">${lesson.title}</h1>
      <p class="dek">${lesson.dek}</p>
    </div>
    <div class="steps" id="steps">${stepData.map((s,i)=>`<div class="step ${i===0?'active':''}" data-step="${s.k}"><div class="sn">${i+1}</div><div class="sl">${s.label}<small>${s.sub}</small></div></div>`).join('')}</div>
    <div class="panel-stage active" data-panel="concept"><div class="prose">${lesson.concept}</div></div>
    <div class="panel-stage" data-panel="example"><div class="prose">${typeof lesson.example==='function'?lesson.example():lesson.example}</div></div>
    <div class="panel-stage" data-panel="lab" id="labPanel"></div>
    <div class="panel-stage" data-panel="quiz" id="quizPanel"></div>
    <div class="lesson-nav" id="lessonNav"></div>`;

  $$('#steps .step').forEach(st=>st.onclick=()=>switchStep(st.dataset.step));
  renderLab(lesson);
  renderQuiz(lesson);
  buildLessonNav(mod,lesson);
  markDone('S:'+lessonId+':concept',XP_PER.concept);
}

function switchStep(k){
  $$('#steps .step').forEach(s=>s.classList.toggle('active',s.dataset.step===k));
  $$('.panel-stage').forEach(p=>p.classList.toggle('active',p.dataset.panel===k));
  $('#stage').scrollTop=Math.max(0,$('#steps').offsetTop-70);
  if(k==='example'&&CURRENT)markDone('S:'+CURRENT.lessonId+':example',XP_PER.example);
}
function setStepDone(k){const s=$(`#steps .step[data-step="${k}"]`);if(s)s.classList.add('done');}

/* ---------- lesson nav (prev/next) ---------- */
function flatLessons(){const arr=[];CURRICULUM.forEach(m=>{if(!m.locked)m.lessons.forEach(l=>arr.push({modId:m.id,lessonId:l.id,mod:m,les:l}));});return arr;}
function buildLessonNav(mod,lesson){
  const flat=flatLessons();
  const idx=flat.findIndex(x=>x.modId===mod.id&&x.lessonId===lesson.id);
  const prev=flat[idx-1],next=flat[idx+1];
  const nav=$('#lessonNav');nav.innerHTML='';
  nav.appendChild(prev?el(`<button data-go='${prev.modId}|${prev.lessonId}'><span class="nl">← Previous</span><span class="nt">${prev.les.num} ${prev.les.title}</span></button>`)
    :el(`<button disabled><span class="nl">← Previous</span><span class="nt">Start of track</span></button>`));
  nav.appendChild(next?el(`<button class="next" data-go='${next.modId}|${next.lessonId}'><span class="nl">Next →</span><span class="nt">${next.les.num} ${next.les.title}</span></button>`)
    :el(`<button class="next" data-home="1"><span class="nl">Track complete →</span><span class="nt">Back to overview</span></button>`));
  $$('#lessonNav button[data-go]').forEach(b=>b.onclick=()=>{const[m,l]=b.dataset.go.split('|');openLesson(m,l);});
  const hb=$('#lessonNav button[data-home]');if(hb)hb.onclick=()=>renderHome();
}

/* ===================================================================
   LAB RENDERERS (dispatch by kind: classify, order, match, quizonly)
   =================================================================== */
function renderLab(lesson){
  const p=$('#labPanel');const lab=lesson.lab;
  if(!lab){p.innerHTML='<p class="empty-hint">No lab in this lesson.</p>';return;}
  const head=`<div class="lab-frame"><div class="lab-top"><span class="badge-lab">Lab ${lesson.num}</span><h3>${lab.title}</h3></div>
    <div class="lab-body"><div class="lab-objective">🎯 <b>Objective.</b> ${lab.objective}</div>
    ${lab.intro?`<p style="color:var(--ink-dim);margin:12px 0 4px">${lab.intro}</p>`:''}
    <div id="labMount"></div></div></div>`;
  p.innerHTML=head;
  const mount=$('#labMount');
  const done=()=>{setStepDone('lab');markDone('S:'+lesson.id+':lab',XP_PER.lab);maybeCompleteLesson(lesson);earnBadge('lab:'+lesson.id,'🧪','Lab cleared!','+'+XP_PER.lab+' XP · '+lab.title);};
  const fn={classify:labClassify,order:labOrder,match:labMatch,quizonly:labQuizOnly}[lab.kind];
  if(fn)fn(mount,lab,done);else mount.innerHTML='<p class="empty-hint">Unknown lab type.</p>';
}

/* -- classify lab (N-way buttons) -- */
function labClassify(mount,lab,done){
  const cats=lab.threeway||['Authentication','Authorization'];
  const state={};
  mount.innerHTML=lab.items.map((it,i)=>`<div class="quiz-card" style="padding:14px 16px;margin:10px 0" data-i="${i}">
    <div style="font-size:13.5px;margin-bottom:10px">${it.t}</div>
    <div class="row">${cats.map(c=>`<button class="btn ghost sm cls" data-i="${i}" data-c="${esc(c)}">${c}</button>`).join('')}
    <span class="tagout" data-i="${i}" style="font-family:var(--mono);font-size:11px"></span></div></div>`).join('')
    +`<button class="btn" id="clsCheck" style="margin-top:8px">Check answers</button><div class="result" id="clsRes"></div>`;
  $$('.cls',mount).forEach(b=>b.onclick=()=>{const i=b.dataset.i;state[i]=b.dataset.c;
    $$(`.cls[data-i="${i}"]`,mount).forEach(x=>x.classList.toggle('ghost',x.dataset.c!==b.dataset.c));
    const t=mount.querySelector(`.tagout[data-i="${i}"]`);t.textContent='→ '+b.dataset.c;t.style.color='var(--gold)';});
  $('#clsCheck',mount).onclick=()=>{
    const res=$('#clsRes',mount);let allRight=lab.items.length>0;const rows=[];
    lab.items.forEach((it,i)=>{const got=state[i];const ok=got===it.layer;if(!ok)allRight=false;
      rows.push(`<li><span class="mk">${ok?'✓':'✗'}</span><span>${ok?'<span style="color:#34d399">'+got+'</span>':'<span style="color:#f87171">'+(got||'—')+'</span> → should be <b>'+it.layer+'</b>'}</span></li>`);});
    res.className='result show '+(allRight?'pass':'fail');
    res.innerHTML=`<div class="rv">${allRight?'✓ All correct — lab cleared':'✗ Not yet — review the misses'}</div><ul>${rows.join('')}</ul>`;
    if(allRight)done();
  };
}

/* -- order lab (sequence the steps) -- */
function labOrder(mount,lab,done){
  let seq=[...lab.scrambled];
  function render(){
    mount.innerHTML=`<div class="lab-objective" style="background:var(--panel-2);border-color:var(--line);color:var(--ink-dim);margin-bottom:12px">Use ▲ / ▼ to reorder, then check.</div>
      <div id="ordList"></div>
      <button class="btn" id="ordCheck" style="margin-top:12px">Check order</button><div class="result" id="ordRes"></div>`;
    const list=$('#ordList',mount);
    seq.forEach((item,i)=>{
      const row=el(`<div class="quiz-card" style="padding:11px 14px;margin:8px 0;display:flex;align-items:center;gap:12px">
        <span style="font-family:var(--mono);color:var(--gold);font-weight:700;width:22px">${i+1}</span>
        <span style="flex:1;font-size:13.5px">${item}</span>
        <span class="row" style="gap:6px"><button class="btn ghost sm up" ${i===0?'disabled':''}>▲</button><button class="btn ghost sm dn" ${i===seq.length-1?'disabled':''}>▼</button></span>
      </div>`);
      row.querySelector('.up').onclick=()=>{[seq[i-1],seq[i]]=[seq[i],seq[i-1]];render();};
      row.querySelector('.dn').onclick=()=>{[seq[i+1],seq[i]]=[seq[i],seq[i+1]];render();};
      list.appendChild(row);
    });
    $('#ordCheck',mount).onclick=()=>{
      const res=$('#ordRes',mount);
      const ok=seq.every((s,i)=>s===lab.correct[i]);
      res.className='result show '+(ok?'pass':'fail');
      if(ok){res.innerHTML=`<div class="rv">✓ Correct order — lab cleared</div><ul>${lab.correct.map((s,i)=>`<li><span class="mk">${i+1}</span><span>${s}</span></li>`).join('')}</ul>`;done();}
      else{const rows=seq.map((s,i)=>`<li><span class="mk">${s===lab.correct[i]?'✓':'✗'}</span><span>${s}</span></li>`).join('');
        res.innerHTML=`<div class="rv">✗ Not the right sequence yet — keep adjusting</div><ul>${rows}</ul>`;}
    };
  }
  render();
}

/* -- match lab (pair left to right) -- */
function labMatch(mount,lab,done){
  const lefts=lab.pairs.map((p,i)=>({...p,i}));
  const rights=lab.pairs.map((p,i)=>p.r).sort(()=>Math.random()-0.5);
  const choice={};
  mount.innerHTML=lefts.map(p=>`<div class="quiz-card" style="padding:13px 15px;margin:9px 0">
    <div style="font-size:13.5px;margin-bottom:9px"><b style="color:var(--gold)">${p.l}</b></div>
    <select class="mt" data-i="${p.i}" style="max-width:520px"><option value="">— choose the match —</option>
      ${rights.map(r=>`<option value="${esc(r)}">${r}</option>`).join('')}</select></div>`).join('')
    +`<button class="btn" id="mtCheck" style="margin-top:8px">Check matches</button><div class="result" id="mtRes"></div>`;
  $$('.mt',mount).forEach(s=>s.onchange=()=>{choice[s.dataset.i]=s.value;});
  $('#mtCheck',mount).onclick=()=>{
    const res=$('#mtRes',mount);let allRight=true;const rows=[];
    lab.pairs.forEach((p,i)=>{const got=choice[i];const ok=got===p.r;if(!ok)allRight=false;
      rows.push(`<li><span class="mk">${ok?'✓':'✗'}</span><span><b>${p.l}</b> → ${ok?'<span style="color:#34d399">'+got+'</span>':'<span style="color:#f87171">'+(got||'—')+'</span> → should be <b>'+p.r+'</b>'}</span></li>`);});
    res.className='result show '+(allRight?'pass':'fail');
    res.innerHTML=`<div class="rv">${allRight?'✓ All matched — lab cleared':'✗ Not yet — review the misses'}</div><ul>${rows.join('')}</ul>`;
    if(allRight)done();
  };
}

/* -- quiz-only lab -- */
function labQuizOnly(mount,lab,done){
  mount.innerHTML=`<div class="callout tip"><span class="ic">🧠</span><div>This lesson's practice lives in the checkpoint. Answer every checkpoint question correctly and this lab marks complete automatically.</div></div>`;
  mount.dataset.autocomplete='1';
}

/* ===================================================================
   QUIZ RENDERER
   =================================================================== */
function renderQuiz(lesson){
  const p=$('#quizPanel');const bank=lesson.quiz||[];
  if(!bank.length){p.innerHTML='<p class="empty-hint">No checkpoint in this lesson.</p>';return;}
  p.innerHTML=`<h2 style="font-family:var(--disp);font-size:20px;margin:0 0 4px">Checkpoint</h2><p style="color:var(--ink-dim);margin:0 0 14px">Answer all ${bank.length} to complete the lesson. You can retry until each is right.</p><div id="quizMount"></div>`;
  const mount=$('#quizMount');const correct=new Set();
  bank.forEach((item,qi)=>{
    const card=el(`<div class="quiz-card"><div class="quiz-progress">Question ${qi+1} of ${bank.length}</div><div class="quiz-q">${item.q}</div><div class="opts"></div><div class="quiz-explain"></div></div>`);
    const opts=card.querySelector('.opts'),exp=card.querySelector('.quiz-explain');
    item.o.forEach((o,oi)=>{
      const b=el(`<button class="quiz-opt"><span class="ltr">${String.fromCharCode(65+oi)}</span><span>${o}</span></button>`);
      b.onclick=()=>{
        opts.querySelectorAll('.quiz-opt').forEach(x=>{x.classList.remove('correct','wrong');});
        if(oi===item.a){b.classList.add('correct');card.dataset.locked='1';correct.add(qi);}
        else{b.classList.add('wrong');opts.children[item.a].classList.add('correct');}
        exp.classList.add('show');exp.innerHTML=(oi===item.a?'<b style="color:var(--green)">✓ Correct. </b>':'<b style="color:var(--red)">Not quite. </b>')+item.e;
        if(correct.size===bank.length){setStepDone('quiz');if(markDone('S:'+lesson.id+':quiz',XP_PER.quiz))earnBadge('quiz:'+lesson.id,'✅','Checkpoint passed!','+'+XP_PER.quiz+' XP');
          const lp=$('#labPanel #labMount');if(lp&&lp.dataset.autocomplete&&CURRENT){setStepDone('lab');if(markDone('S:'+lesson.id+':lab',XP_PER.lab))earnBadge('lab:'+lesson.id,'🧪','Lab cleared!','reasoning complete');}
          maybeCompleteLesson(lesson);
        }
      };
      opts.appendChild(b);
    });
    mount.appendChild(card);
  });
}

/* ---------- lesson completion ---------- */
function maybeCompleteLesson(lesson){
  const need=['concept','lab','quiz'].map(s=>'S:'+lesson.id+':'+s);
  if(need.every(k=>STATE.done.has(k))){
    if(markDone('L:'+lesson.id,XP_PER.lesson)){
      earnBadge('lesson:'+lesson.id,'🎖️','Lesson '+lesson.num+' complete!','You finished "'+lesson.title+'"');
      const mod=CURRICULUM.find(m=>m.lessons.some(l=>l.id===lesson.id));
      if(mod.lessons.every(l=>STATE.done.has('L:'+l.id)))
        setTimeout(()=>earnBadge('mod:'+mod.id,'🏆','Module '+mod.num+' mastered!','"'+mod.title+'" — outstanding work'),1200);
    }
  }
  refreshProgressUI();
}

/* ---------- boot ---------- */
loadState();
buildRail();
addXp(0);
refreshProgressUI();
renderHome();
const _homeLogo=$('#homeLogo'); if(_homeLogo)_homeLogo.onclick=()=>renderHome();
const _navHome=$('#navHome'); if(_navHome)_navHome.onclick=()=>renderHome();
function paintSoundBtn(){ const b=$('#soundBtn'); if(b){ const on=SOUND.isOn(); b.textContent = on?'♪ Sound on':'♪ Muted'; b.title = on?'Sound on (click to mute)':'Sound muted (click to enable)'; b.setAttribute('aria-pressed', on?'true':'false'); b.classList.toggle('muted',!on); } }
const _sb=$('#soundBtn'); if(_sb){ paintSoundBtn(); _sb.onclick=()=>{ const on=SOUND.toggle(); paintSoundBtn(); if(on)SOUND.tick(); }; }
(function(){
  const stage=$('#stage'); if(!stage||typeof MutationObserver==='undefined')return;
  const obs=new MutationObserver(muts=>{
    for(const mu of muts){
      const t=mu.target;
      if(t&&t.classList&&t.classList.contains('result')&&t.classList.contains('fail')&&t.classList.contains('show')){
        if(t.dataset.snd!=='f'){ t.dataset.snd='f'; try{SOUND.error();}catch(e){} }
      }
      if(t&&t.classList&&t.classList.contains('result')&&t.classList.contains('pass')){ t.dataset.snd='p'; }
    }
  });
  obs.observe(stage,{subtree:true,attributes:true,attributeFilter:['class']});
})();
</script>
</body>
